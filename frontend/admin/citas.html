<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestión de Citas y Consultas - Admin LexPenal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <style>
        .sidebar {
            transition: transform 0.3s ease;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1001;
                width: 260px;
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0 !important;
                padding: 1rem;
                margin-top: 60px;
            }
            .menu-toggle-btn {
                display: block !important;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1002;
                background: #C8A951;
                border: none;
                color: #000;
                font-size: 1.5rem;
                padding: 0.5rem 0.8rem;
                border-radius: 8px;
                cursor: pointer;
            }
            .stats-grid {
                grid-template-columns: 1fr !important;
            }
            .table-container {
                overflow-x: auto;
            }
            table {
                font-size: 0.8rem;
            }
            th, td {
                padding: 0.5rem !important;
            }
            .tabs {
                flex-wrap: wrap;
            }
        }
        @media (min-width: 769px) {
            .menu-toggle-btn {
                display: none;
            }
            .main-content {
                margin-left: 280px;
            }
        }
        .menu-toggle-btn {
            display: none;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #C8A95133;
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #C8A951;
            border-bottom: 2px solid #C8A951;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .badge-pendiente { background: #ff9800; color: #000; }
        .badge-en_proceso { background: #2196f3; color: #fff; }
        .badge-resuelto { background: #4caf50; color: #fff; }
        .badge-cancelada { background: #f44336; color: #fff; }
    </style>
</head>
<body>
    <button class="menu-toggle-btn" id="menuToggleBtn">☰</button>
    
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo" style="cursor:pointer" onclick="window.location.href='/admin/index.html'">
                <h2>⚖️ LexPenal</h2>
                <p>Panel de Control</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin/index.html">📊 Dashboard</a>
                <a href="/admin/citas.html" class="active">📅 Citas y Consultas</a>
                <a href="/admin/plantillas.html">📄 Plantillas</a>
                <a href="/admin/configuracion.html">⚙️ Configuración</a>
                <a href="/calculadora.html" target="_blank" style="border-top: 1px solid rgba(200,169,81,0.3); margin-top: 1rem; padding-top: 1rem;">⚖️ Calculadora de Penas</a>
            </nav>
            <div class="sidebar-footer">
                <p>Dr. Asmairo Conde Torres</p>
                <p><button onclick="cerrarSesion()" class="btn-logout" style="margin-top:1rem">Cerrar sesión</button></p>
            </div>
        </aside>

        <main class="main-content">
            <div class="admin-header">
                <h1>📅 Citas y Consultas</h1>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="mostrarTab('consultas')">📞 Consultas</button>
                <button class="tab-btn" onclick="mostrarTab('citas')">📅 Citas</button>
            </div>

            <div id="tabConsultas" class="tab-content active">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Código</th><th>Nombre</th><th>Teléfono</th><th>Rama</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr>
                        </thead>
                        <tbody id="listaConsultas">
                            <tr><td colspan="7">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="tabCitas" class="tab-content">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Código</th><th>Nombre</th><th>Teléfono</th><th>Rama</th><th>Fecha Cita</th><th>Estado</th><th>Acciones</th></tr>
                        </thead>
                        <tbody id="listaCitas">
                            <tr><td colspan="7">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modalDetalle" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>📋 Detalles</h3>
                <button class="close-modal" onclick="cerrarModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
            <div style="margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 1rem;">
                <select id="estadoSelect" style="flex:1; padding:0.5rem; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:5px;">
                    <option value="pendiente">Pendiente</option>
                    <option value="en_proceso">En Proceso</option>
                    <option value="resuelto">Resuelto</option>
                    <option value="cancelada">Cancelada</option>
                </select>
                <button class="btn-primary" onclick="actualizarEstado()">Actualizar Estado</button>
                <button class="btn-danger" onclick="eliminarRegistro()">Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        let currentItem = null;
        let currentTipo = null;

        if (!token) window.location.href = '/login.html';

        // Menú responsive
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        menuToggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('mobile-open');
        });
        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('mobile-open');
            });
        });

        async function cargarDatos() {
            const res = await fetch(`${API_URL}/casos/todos`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            const consultas = data.consultas || [];
            const citas = data.citas || [];
            
            const tbodyConsultas = document.getElementById('listaConsultas');
            if (consultas.length === 0) {
                tbodyConsultas.innerHTML = '<tr><td colspan="7">No hay consultas registradas</td></tr>';
            } else {
                tbodyConsultas.innerHTML = consultas.map(c => `
                    <tr>
                        <td><code>${c.codigo || 'N/A'}</code></td>
                        <td>${c.nombre || '-'}</td>
                        <td>${c.telefono || '-'}</td>
                        <td>${c.rama || 'general'}</td>
                        <td>${new Date(c.fecha).toLocaleDateString()}</td>
                        <td><span class="badge badge-${c.estado || 'pendiente'}">${c.estado || 'pendiente'}</span></td>
                        <td><button class="btn-primary" style="padding:0.3rem 0.6rem;" onclick="verDetalle(${c.id}, 'consulta')">Ver</button></td>
                    </tr>
                `).join('');
            }
            
            const tbodyCitas = document.getElementById('listaCitas');
            if (citas.length === 0) {
                tbodyCitas.innerHTML = '<tr><td colspan="7">No hay citas registradas</td></tr>';
            } else {
                tbodyCitas.innerHTML = citas.map(c => `
                    <tr>
                        <td><code>${c.codigo || 'N/A'}</code></td>
                        <td>${c.nombre || '-'}</td>
                        <td>${c.telefono || '-'}</td>
                        <td>${c.rama || 'general'}</td>
                        <td>${c.fecha ? new Date(c.fecha).toLocaleDateString() : '-'}</td>
                        <td><span class="badge badge-${c.estado || 'pendiente'}">${c.estado || 'pendiente'}</span></td>
                        <td><button class="btn-primary" style="padding:0.3rem 0.6rem;" onclick="verDetalle(${c.id}, 'cita')">Ver</button></td>
                    </tr>
                `).join('');
            }
        }

        async function verDetalle(id, tipo) {
            currentTipo = tipo;
            const res = await fetch(`${API_URL}/casos/todos`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const items = tipo === 'consulta' ? data.consultas : data.citas;
            currentItem = items.find(i => i.id === id);
            
            if (currentItem) {
                const modalBody = document.getElementById('modalBody');
                document.getElementById('estadoSelect').value = currentItem.estado || 'pendiente';
                
                let html = `
                    <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                        <div style="color: #C8A951; font-weight: bold;">📌 Código</div>
                        <div style="color: #fff;">${currentItem.codigo || 'N/A'}</div>
                    </div>
                    <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                        <div style="color: #C8A951; font-weight: bold;">👤 Nombre</div>
                        <div style="color: #fff;">${currentItem.nombre || 'N/A'}</div>
                    </div>
                    <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                        <div style="color: #C8A951; font-weight: bold;">📞 Teléfono</div>
                        <div style="color: #fff;">${currentItem.telefono || 'N/A'}</div>
                    </div>
                    <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                        <div style="color: #C8A951; font-weight: bold;">✉️ Email</div>
                        <div style="color: #fff;">${currentItem.email || 'N/A'}</div>
                    </div>
                    <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                        <div style="color: #C8A951; font-weight: bold;">⚖️ Rama</div>
                        <div style="color: #fff;">${currentItem.rama || 'general'}</div>
                    </div>
                `;
                
                if (tipo === 'consulta') {
                    html += `
                        <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                            <div style="color: #C8A951; font-weight: bold;">📝 Hechos</div>
                            <div style="color: #fff;">${currentItem.hechos || 'N/A'}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                            <div style="color: #C8A951; font-weight: bold;">📝 Motivo</div>
                            <div style="color: #fff;">${currentItem.motivo || 'N/A'}</div>
                        </div>
                        <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                            <div style="color: #C8A951; font-weight: bold;">📅 Fecha Cita</div>
                            <div style="color: #fff;">${currentItem.fecha ? new Date(currentItem.fecha).toLocaleString() : 'N/A'}</div>
                        </div>
                    `;
                }
                
                if (currentItem.notas_admin) {
                    html += `
                        <div style="margin-bottom: 0.8rem; border-left: 2px solid #C8A951; padding-left: 1rem;">
                            <div style="color: #C8A951; font-weight: bold;">📝 Notas</div>
                            <div style="color: #fff;">${currentItem.notas_admin}</div>
                        </div>
                    `;
                }
                
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('modalDetalle').style.display = 'flex';
            }
        }

        async function actualizarEstado() {
            const nuevoEstado = document.getElementById('estadoSelect').value;
            const res = await fetch(`${API_URL}/casos/${currentItem.id}/estado`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ estado: nuevoEstado, tipo: currentTipo })
            });
            if (res.ok) {
                alert('Estado actualizado');
                cerrarModal();
                cargarDatos();
            } else {
                alert('Error al actualizar');
            }
        }

        async function eliminarRegistro() {
            if (confirm('¿Eliminar este registro permanentemente?')) {
                const res = await fetch(`${API_URL}/casos/${currentItem.id}`, {
                    method: 'DELETE',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ tipo: currentTipo })
                });
                if (res.ok) {
                    alert('Registro eliminado');
                    cerrarModal();
                    cargarDatos();
                } else {
                    alert('Error al eliminar');
                }
            }
        }

        function mostrarTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'consultas') {
                document.getElementById('tabConsultas').classList.add('active');
                document.querySelector('.tab-btn:first-child').classList.add('active');
            } else {
                document.getElementById('tabCitas').classList.add('active');
                document.querySelector('.tab-btn:last-child').classList.add('active');
            }
        }

        function cerrarModal() {
            document.getElementById('modalDetalle').style.display = 'none';
            currentItem = null;
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        cargarDatos();
    </script>
</body>
</html>
