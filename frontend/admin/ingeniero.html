<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel de Ingeniero - LexPenal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Code+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            font-family: 'Source Code Pro', monospace;
            color: #00ff00;
        }
        
        .navbar {
            background: rgba(0, 0, 0, 0.95);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid #00aaff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00aaff;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .btn-cerrar {
            background: transparent;
            border: 1px solid #8B0000;
            color: #8B0000;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            font-family: monospace;
        }
        
        .btn-cerrar:hover {
            background: #8B0000;
            color: #fff;
        }
        
        .ingeniero-container {
            max-width: 1200px;
            margin: 80px auto 2rem;
            padding: 1.5rem;
        }
        
        .info-card {
            background: #0a0a0a;
            border-radius: 10px;
            border: 1px solid #00aaff;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .info-card h3 {
            color: #00aaff;
            margin-bottom: 1rem;
            border-left: 3px solid #00aaff;
            padding-left: 0.8rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.3rem 0;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .info-label {
            color: #888;
            font-size: 0.75rem;
        }
        
        .info-value {
            color: #00ff00;
            font-size: 0.75rem;
            font-family: monospace;
        }
        
        .btn-tech {
            background: #1a1a1a;
            border: 1px solid #00aaff;
            border-radius: 5px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            color: #00aaff;
            font-family: monospace;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-right: 0.5rem;
        }
        
        .btn-tech:hover {
            background: #00aaff;
            color: #000;
        }
        
        .log-line {
            font-family: monospace;
            font-size: 0.7rem;
            padding: 0.2rem 0;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .log-line.success { color: #00ff00; }
        .log-line.info { color: #00aaff; }
        .log-line.error { color: #ff4444; }
        
        @media (max-width: 768px) {
            .ingeniero-container { padding: 1rem; margin-top: 70px; }
            .navbar { padding: 0.8rem 1rem; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='/'">⚡ LexPenal :: Ingeniero</div>
        <div class="user-info">
            <span id="nombreIngeniero" style="color:#00aaff;">Cargando...</span>
            <button onclick="cerrarSesion()" class="btn-cerrar">Cerrar sesion</button>
        </div>
    </nav>

    <div class="ingeniero-container">
        <div class="info-card">
            <h3>🖥️ Estado del Servidor</h3>
            <div id="serverStatus">
                <div class="info-row"><span class="info-label">Estado:</span><span class="info-value">🟡 Verificando...</span></div>
            </div>
            <button class="btn-tech" onclick="cargarDatos()">🔄 Actualizar</button>
        </div>
        
        <div class="info-card">
            <h3>📊 Estadísticas</h3>
            <div id="stats">
                <div class="info-row"><span class="info-label">Cargando...</span><span class="info-value">-</span></div>
            </div>
        </div>
        
        <div class="info-card">
            <h3>🔧 Acciones Rápidas</h3>
            <button class="btn-tech" onclick="probarAPI()">📡 Probar API</button>
            <button class="btn-tech" onclick="respaldarDB()">💾 Backup</button>
            <button class="btn-tech" onclick="limpiarCacheLocal()">🗑️ Limpiar Cache</button>
            <button class="btn-tech" onclick="verSupabase()">☁️ Supabase</button>
            <div id="actionResult" style="margin-top: 1rem; font-size: 0.7rem;"></div>
        </div>
        
        <div class="info-card">
            <h3>📋 Información de Sesión</h3>
            <div id="sessionInfo"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const API_URL = API_BASE_URL + '/api';
        
        let token = localStorage.getItem('token');
        let rol = localStorage.getItem('rol');
        
        // Mostrar información de sesión
        document.getElementById('sessionInfo').innerHTML = `
            <div class="info-row"><span class="info-label">Usuario:</span><span class="info-value">${localStorage.getItem('nombre') || 'No disponible'}</span></div>
            <div class="info-row"><span class="info-label">Cédula:</span><span class="info-value">${localStorage.getItem('cedula') || 'No disponible'}</span></div>
            <div class="info-row"><span class="info-label">Rol:</span><span class="info-value">${rol || 'No disponible'}</span></div>
            <div class="info-row"><span class="info-label">Token:</span><span class="info-value">${token ? '✅ Presente' : '❌ Ausente'}</span></div>
        `;
        
        document.getElementById('nombreIngeniero').textContent = localStorage.getItem('nombre') || 'Ingeniero';
        
        // Verificar autenticación
        if (!token) {
            alert('No hay sesión activa');
            window.location.href = '/login.html';
        }
        
        if (rol !== 'ingeniero') {
            alert('Acceso denegado');
            window.location.href = '/login.html';
        }
        
        async function cargarDatos() {
            await cargarStatus();
            await cargarStats();
        }
        
        async function cargarStatus() {
            const container = document.getElementById('serverStatus');
            container.innerHTML = '<div class="info-row"><span class="info-label">Estado:</span><span class="info-value">🟡 Verificando...</span></div>';
            
            try {
                const res = await fetch(API_URL + '/ingeniero/status', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) {
                    container.innerHTML = '<div class="info-row"><span class="info-label">Estado:</span><span class="info-value error">🔴 Sesión expirada</span></div>';
                    return;
                }
                
                const data = await res.json();
                if (data.success) {
                    container.innerHTML = `
                        <div class="info-row"><span class="info-label">Estado:</span><span class="info-value success">🟢 Activo</span></div>
                        <div class="info-row"><span class="info-label">Hostname:</span><span class="info-value">${data.sistema.hostname}</span></div>
                        <div class="info-row"><span class="info-label">Node.js:</span><span class="info-value">${data.node.version}</span></div>
                        <div class="info-row"><span class="info-label">Memoria:</span><span class="info-value">${data.node.memoria}</span></div>
                    `;
                } else {
                    container.innerHTML = `<div class="info-row"><span class="info-label">Error:</span><span class="info-value error">${data.error}</span></div>`;
                }
            } catch(e) {
                container.innerHTML = `<div class="info-row"><span class="info-label">Error:</span><span class="info-value error">Conexión fallida</span></div>`;
            }
        }
        
        async function cargarStats() {
            const container = document.getElementById('stats');
            container.innerHTML = '<div class="info-row"><span class="info-label">Cargando estadísticas...</span><span class="info-value">-</span></div>';
            
            try {
                const res = await fetch(API_URL + '/ingeniero/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) {
                    container.innerHTML = '<div class="info-row"><span class="info-label">Estado:</span><span class="info-value error">Sesión expirada</span></div>';
                    return;
                }
                
                const data = await res.json();
                if (data.success) {
                    container.innerHTML = `
                        <div class="info-row"><span class="info-label">Total Consultas:</span><span class="info-value">${data.total_consultas}</span></div>
                        <div class="info-row"><span class="info-label">Total Citas:</span><span class="info-value">${data.total_citas}</span></div>
                        <div class="info-row"><span class="info-label">Usuarios:</span><span class="info-value">${data.usuarios}</span></div>
                        <div class="info-row"><span class="info-label">Plantillas:</span><span class="info-value">${data.plantillas}</span></div>
                    `;
                } else {
                    container.innerHTML = `<div class="info-row"><span class="info-label">Error:</span><span class="info-value error">${data.error}</span></div>`;
                }
            } catch(e) {
                container.innerHTML = `<div class="info-row"><span class="info-label">Error:</span><span class="info-value error">Conexión fallida</span></div>`;
            }
        }
        
        async function probarAPI() {
            document.getElementById('actionResult').innerHTML = '<div class="log-line info">Probando API...</div>';
            try {
                const res = await fetch(API_URL + '/admin/dashboard', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    document.getElementById('actionResult').innerHTML = '<div class="log-line success">✅ API OK</div>';
                } else if (res.status === 401) {
                    document.getElementById('actionResult').innerHTML = '<div class="log-line error">❌ Sesión expirada</div>';
                } else {
                    document.getElementById('actionResult').innerHTML = `<div class="log-line error">❌ Error: ${res.status}</div>`;
                }
            } catch(e) {
                document.getElementById('actionResult').innerHTML = `<div class="log-line error">❌ ${e.message}</div>`;
            }
        }
        
        async function respaldarDB() {
            document.getElementById('actionResult').innerHTML = '<div class="log-line info">Generando backup...</div>';
            try {
                const res = await fetch(API_URL + '/exportar/excel?token=' + token);
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `backup_${Date.now()}.xlsx`;
                    a.click();
                    document.getElementById('actionResult').innerHTML = '<div class="log-line success">✅ Backup generado</div>';
                } else if (res.status === 401) {
                    document.getElementById('actionResult').innerHTML = '<div class="log-line error">❌ Sesión expirada</div>';
                } else {
                    document.getElementById('actionResult').innerHTML = `<div class="log-line error">❌ Error: ${res.status}</div>`;
                }
            } catch(e) {
                document.getElementById('actionResult').innerHTML = `<div class="log-line error">❌ ${e.message}</div>`;
            }
        }
        
        function limpiarCacheLocal() {
            if (confirm('¿Limpiar cache? Se cerrará sesión.')) {
                localStorage.clear();
                window.location.href = '/login.html';
            }
        }
        
        function verSupabase() {
            window.open('https://supabase.com/dashboard', '_blank');
        }
        
        function cerrarSesion() {
            localStorage.clear();
            window.location.href = '/login.html';
        }
        
        // Cargar datos iniciales
        cargarStatus();
        cargarStats();
        
        window.cargarDatos = cargarDatos;
        window.probarAPI = probarAPI;
        window.respaldarDB = respaldarDB;
        window.limpiarCacheLocal = limpiarCacheLocal;
        window.verSupabase = verSupabase;
        window.cerrarSesion = cerrarSesion;
    </script>
</body>
</html>
