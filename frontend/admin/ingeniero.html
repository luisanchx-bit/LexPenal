<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel de Ingeniero - LexPenal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Code+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            font-family: 'Source Code Pro', monospace;
            color: #00ff00;
        }
        
        .navbar {
            background: rgba(0, 0, 0, 0.95);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid #00aaff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00aaff;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .btn-cerrar {
            background: transparent;
            border: 1px solid #8B0000;
            color: #8B0000;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            font-family: monospace;
        }
        
        .btn-cerrar:hover {
            background: #8B0000;
            color: #fff;
        }
        
        .ingeniero-container {
            max-width: 1400px;
            margin: 80px auto 2rem;
            padding: 1.5rem;
        }
        
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .terminal-card {
            background: #0a0a0a;
            border-radius: 10px;
            border: 1px solid #00aaff;
            overflow: hidden;
        }
        
        .terminal-header {
            background: #1a1a1a;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #00aaff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .terminal-dots {
            display: flex;
            gap: 0.3rem;
        }
        
        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }
        
        .terminal-title {
            color: #888;
            font-size: 0.75rem;
            margin-left: 0.5rem;
            font-family: monospace;
        }
        
        .terminal-body {
            padding: 1rem;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.75rem;
            background: #050505;
            color: #00ff00;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .btn-tech {
            background: #1a1a1a;
            border: 1px solid #00aaff;
            border-radius: 5px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            color: #00aaff;
            font-family: monospace;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-right: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .btn-tech:hover {
            background: #00aaff;
            color: #000;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.3rem 0;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .status-label {
            color: #888;
            font-size: 0.7rem;
        }
        
        .status-value {
            color: #00ff00;
            font-size: 0.7rem;
            font-family: monospace;
        }
        
        .log-line {
            font-family: monospace;
            font-size: 0.7rem;
            padding: 0.2rem 0;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .log-line.error { color: #ff4444; }
        .log-line.success { color: #00ff00; }
        .log-line.info { color: #00aaff; }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 12px;
            background-color: #00ff00;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        @media (max-width: 768px) {
            .tech-grid { grid-template-columns: 1fr; }
            .ingeniero-container { padding: 1rem; margin-top: 70px; }
            .navbar { padding: 0.8rem 1rem; }
            .logo { font-size: 1.2rem; }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 4px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='/'">⚡ LexPenal :: Ingeniero</div>
        <div class="user-info">
            <span id="nombreIngeniero" style="color:#00aaff;">Cargando...</span>
            <button onclick="cerrarSesion()" class="btn-cerrar">Cerrar sesion</button>
        </div>
    </nav>

    <div class="ingeniero-container">
        <div class="tech-grid">
            <div class="terminal-card">
                <div class="terminal-header">
                    <div class="terminal-dots"><div class="terminal-dot red"></div><div class="terminal-dot yellow"></div><div class="terminal-dot green"></div></div>
                    <div class="terminal-title">system@lexpenal:~$ status</div>
                </div>
                <div class="terminal-body" id="systemStatus">
                    <div class="log-line info">Cargando estado del sistema...</div>
                </div>
                <div style="padding: 0.5rem;">
                    <button class="btn-tech" onclick="cargarStatus()">🔄 Actualizar</button>
                </div>
            </div>
            
            <div class="terminal-card">
                <div class="terminal-header">
                    <div class="terminal-dots"><div class="terminal-dot red"></div><div class="terminal-dot yellow"></div><div class="terminal-dot green"></div></div>
                    <div class="terminal-title">stat@lexpenal:~$ analytics</div>
                </div>
                <div class="terminal-body" id="stats">
                    <div class="log-line info">Cargando estadísticas...</div>
                </div>
                <div style="padding: 0.5rem;">
                    <button class="btn-tech" onclick="cargarStats()">🔄 Actualizar</button>
                </div>
            </div>
        </div>
        
        <div class="tech-grid">
            <div class="terminal-card">
                <div class="terminal-header">
                    <div class="terminal-dots"><div class="terminal-dot red"></div><div class="terminal-dot yellow"></div><div class="terminal-dot green"></div></div>
                    <div class="terminal-title">admin@lexpenal:~$ actions</div>
                </div>
                <div class="terminal-body">
                    <button class="btn-tech" onclick="probarAPI()">📡 Probar API</button>
                    <button class="btn-tech" onclick="respaldarDB()">💾 Backup DB</button>
                    <button class="btn-tech" onclick="limpiarCacheLocal()">🗑️ Limpiar Cache</button>
                    <button class="btn-tech" onclick="verSupabase()">☁️ Supabase</button>
                    <div id="actionResult" style="margin-top: 1rem; font-size: 0.7rem;"></div>
                </div>
            </div>
            
            <div class="terminal-card">
                <div class="terminal-header">
                    <div class="terminal-dots"><div class="terminal-dot red"></div><div class="terminal-dot yellow"></div><div class="terminal-dot green"></div></div>
                    <div class="terminal-title">ingeniero@lexpenal:~$ logs</div>
                </div>
                <div class="terminal-body" id="logsContainer" style="height: 250px;">
                    <div class="log-line info">[INIT] Sistema iniciado</div>
                    <span class="cursor"></span>
                </div>
                <div style="padding: 0.5rem;">
                    <button class="btn-tech" onclick="limpiarLogsLocal()">🗑️ Limpiar</button>
                    <button class="btn-tech" onclick="descargarLogsLocal()">📥 Descargar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const API_URL = API_BASE_URL + '/api';
        
        // Función para verificar y renovar token
        async function verificarToken() {
            let token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return false;
            }
            
            try {
                const res = await fetch(API_URL + '/auth/verificar', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.valid) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                    return false;
                }
                return true;
            } catch(e) {
                localStorage.clear();
                window.location.href = '/login.html';
                return false;
            }
        }
        
        async function getToken() {
            let token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return null;
            }
            return token;
        }
        
        let logsLocales = [];
        
        function agregarLog(mensaje, tipo) {
            const time = new Date().toLocaleTimeString();
            logsLocales.unshift({ time, mensaje, tipo: tipo || 'info' });
            if (logsLocales.length > 100) logsLocales.pop();
            actualizarLogs();
        }
        
        function actualizarLogs() {
            const container = document.getElementById('logsContainer');
            if (logsLocales.length === 0) {
                container.innerHTML = '<div class="log-line info">[INIT] Sistema listo</div><span class="cursor"></span>';
                return;
            }
            container.innerHTML = logsLocales.map(log => 
                `<div class="log-line ${log.tipo}">[${log.time}] ${log.mensaje}</div>`
            ).join('') + '<span class="cursor"></span>';
            container.scrollTop = container.scrollHeight;
        }
        
        async function cargarStatus() {
            const token = await getToken();
            if (!token) return;
            
            const container = document.getElementById('systemStatus');
            container.innerHTML = '<div class="log-line info">Cargando...</div>';
            try {
                const res = await fetch(API_URL + '/ingeniero/status', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                    return;
                }
                const data = await res.json();
                if (data.success) {
                    container.innerHTML = `
                        <div class="status-row"><span class="status-label">Hostname:</span><span class="status-value">${data.sistema.hostname}</span></div>
                        <div class="status-row"><span class="status-label">Plataforma:</span><span class="status-value">${data.sistema.platform} ${data.sistema.arch}</span></div>
                        <div class="status-row"><span class="status-label">Memoria Total:</span><span class="status-value">${data.sistema.memoria_total}</span></div>
                        <div class="status-row"><span class="status-label">Memoria Libre:</span><span class="status-value">${data.sistema.memoria_libre}</span></div>
                        <div class="status-row"><span class="status-label">CPU Cores:</span><span class="status-value">${data.sistema.cpus}</span></div>
                        <div class="status-row"><span class="status-label">Node.js:</span><span class="status-value">${data.node.version}</span></div>
                        <div class="status-row"><span class="status-label">Memoria Heap:</span><span class="status-value">${data.node.memoria}</span></div>
                    `;
                    agregarLog('Estado actualizado', 'success');
                } else {
                    container.innerHTML = `<div class="log-line error">Error: ${data.error}</div>`;
                }
            } catch(e) {
                container.innerHTML = `<div class="log-line error">Error de conexion</div>`;
                agregarLog('Error al cargar estado', 'error');
            }
        }
        
        async function cargarStats() {
            const token = await getToken();
            if (!token) return;
            
            const container = document.getElementById('stats');
            container.innerHTML = '<div class="log-line info">Cargando...</div>';
            try {
                const res = await fetch(API_URL + '/ingeniero/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                    return;
                }
                const data = await res.json();
                if (data.success) {
                    container.innerHTML = `
                        <div class="status-row"><span class="status-label">Total Consultas:</span><span class="status-value">${data.total_consultas}</span></div>
                        <div class="status-row"><span class="status-label">Total Citas:</span><span class="status-value">${data.total_citas}</span></div>
                        <div class="status-row"><span class="status-label">Usuarios:</span><span class="status-value">${data.usuarios}</span></div>
                        <div class="status-row"><span class="status-label">Plantillas:</span><span class="status-value">${data.plantillas}</span></div>
                        <div class="status-row"><span class="status-label">Documentos:</span><span class="status-value">${data.documentos}</span></div>
                    `;
                    agregarLog('Estadisticas actualizadas', 'success');
                } else {
                    container.innerHTML = `<div class="log-line error">Error: ${data.error}</div>`;
                }
            } catch(e) {
                container.innerHTML = `<div class="log-line error">Error de conexion</div>`;
                agregarLog('Error al cargar stats', 'error');
            }
        }
        
        async function probarAPI() {
            const token = await getToken();
            if (!token) return;
            
            document.getElementById('actionResult').innerHTML = '<div class="log-line info">Probando API...</div>';
            try {
                const res = await fetch(API_URL + '/admin/dashboard', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                    return;
                }
                if (res.ok) {
                    document.getElementById('actionResult').innerHTML = '<div class="log-line success">✅ API OK</div>';
                    agregarLog('API probada exitosamente', 'success');
                } else {
                    document.getElementById('actionResult').innerHTML = `<div class="log-line error">Error: ${res.status}</div>`;
                }
            } catch(e) {
                document.getElementById('actionResult').innerHTML = `<div class="log-line error">${e.message}</div>`;
            }
        }
        
        async function respaldarDB() {
            const token = await getToken();
            if (!token) return;
            
            document.getElementById('actionResult').innerHTML = '<div class="log-line info">Generando backup...</div>';
            try {
                const res = await fetch(API_URL + '/exportar/excel?token=' + token);
                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                    return;
                }
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `backup_${Date.now()}.xlsx`;
                    a.click();
                    document.getElementById('actionResult').innerHTML = '<div class="log-line success">✅ Backup generado</div>';
                    agregarLog('Backup completado', 'success');
                } else {
                    document.getElementById('actionResult').innerHTML = `<div class="log-line error">Error: ${res.status}</div>`;
                }
            } catch(e) {
                document.getElementById('actionResult').innerHTML = `<div class="log-line error">${e.message}</div>`;
            }
        }
        
        function limpiarCacheLocal() {
            if (confirm('¿Limpiar cache? Se cerrara sesion.')) {
                localStorage.clear();
                window.location.href = '/login.html';
            }
        }
        
        function verSupabase() {
            window.open('https://supabase.com/dashboard/projects', '_blank');
            agregarLog('Abriendo Supabase', 'info');
        }
        
        function limpiarLogsLocal() {
            logsLocales = [];
            agregarLog('Logs limpiados', 'info');
            actualizarLogs();
        }
        
        function descargarLogsLocal() {
            const logsText = logsLocales.map(l => `[${l.time}] ${l.mensaje}`).join('\n');
            const blob = new Blob([logsText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `logs_${Date.now()}.txt`;
            a.click();
        }
        
        function cerrarSesion() {
            localStorage.clear();
            window.location.href = '/login.html';
        }
        
        // Inicialización
        verificarToken().then(() => {
            document.getElementById('nombreIngeniero').textContent = localStorage.getItem('nombre') || 'Ingeniero';
            agregarLog('Panel de ingeniero iniciado', 'success');
            cargarStatus();
            cargarStats();
            
            setInterval(() => {
                cargarStatus();
                cargarStats();
            }, 30000);
        });
        
        window.cargarStatus = cargarStatus;
        window.cargarStats = cargarStats;
        window.probarAPI = probarAPI;
        window.respaldarDB = respaldarDB;
        window.limpiarCacheLocal = limpiarCacheLocal;
        window.verSupabase = verSupabase;
        window.limpiarLogsLocal = limpiarLogsLocal;
        window.descargarLogsLocal = descargarLogsLocal;
        window.cerrarSesion = cerrarSesion;
    </script>
</body>
</html>
