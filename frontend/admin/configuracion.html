<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - Admin LexPenal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h2>⚖️ LexPenal</h2><p>Panel de Control</p></div>
            <nav class="sidebar-nav">
                <a href="/admin/index.html">📊 Dashboard</a>
                <a href="/admin/interface.html">🎨 Interfaz</a>
                <a href="/admin/casos.html">📋 Casos</a>
                <a href="/admin/testimonios.html">💬 Testimonios</a>
                <a href="/admin/plantillas.html">📄 Plantillas</a>
                <a href="/admin/menu.html">📑 Menú</a>
                <a href="/admin/estadisticas.html">📈 Estadísticas</a>
                <a href="/admin/configuracion.html" class="active">⚙️ Configuración</a>
            </nav>
            <div class="sidebar-footer"><p>Dr. Asmairo Conde Torres</p><button onclick="cerrarSesion()" class="btn-logout" style="margin-top:1rem">Cerrar sesión</button></div>
        </aside>

        <main class="main-content">
            <div class="admin-header"><h1>Configuración General</h1></div>
            <div style="display:grid; gap:2rem">
                <div class="table-container" style="padding:1.5rem"><h3 style="margin-bottom:1rem">👤 Datos del Abogado</h3>
                    <div class="form-group"><label>Nombre</label><input type="text" id="nombre" class="form-control"></div>
                    <div class="form-group"><label>Teléfono</label><input type="text" id="telefono" class="form-control"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="email" class="form-control"></div>
                    <button class="btn-primary" onclick="guardarAbogado()">Guardar Cambios</button>
                </div>
                <div class="table-container" style="padding:1.5rem"><h3 style="margin-bottom:1rem">🎨 Personalización</h3>
                    <div class="form-group"><label>Color Dorado</label><input type="color" id="colorDorado" class="form-control"></div>
                    <div class="form-group"><label>Color Azul</label><input type="color" id="colorAzul" class="form-control"></div>
                    <div class="form-group"><label>Texto Hero</label><input type="text" id="heroTitulo" class="form-control"></div>
                    <div class="form-group"><label>Subtítulo Hero</label><input type="text" id="heroSubtitulo" class="form-control"></div>
                    <button class="btn-primary" onclick="guardarConfiguracion()">Guardar Cambios</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        const isAdmin = localStorage.getItem('isAdmin');

        if (!token || isAdmin !== 'true') { window.location.href = '/login.html'; }

        async function cargarConfiguracion() {
            const resAbogado = await fetch(`${API_URL}/admin/abogado`, { headers: { 'Authorization': `Bearer ${token}` } });
            const abogado = await resAbogado.json();
            document.getElementById('nombre').value = abogado.nombre || '';
            document.getElementById('telefono').value = abogado.telefono || '';
            document.getElementById('email').value = abogado.email || '';
            const resConfig = await fetch(`${API_URL}/admin/configuracion`, { headers: { 'Authorization': `Bearer ${token}` } });
            const config = await resConfig.json();
            document.getElementById('colorDorado').value = config.colores?.dorado || '#C8A951';
            document.getElementById('colorAzul').value = config.colores?.azul || '#0A1628';
            document.getElementById('heroTitulo').value = config.textos?.hero_titulo || '';
            document.getElementById('heroSubtitulo').value = config.textos?.hero_subtitulo || '';
        }

        async function guardarAbogado() {
            const data = { nombre: document.getElementById('nombre').value, telefono: document.getElementById('telefono').value, email: document.getElementById('email').value };
            const res = await fetch(`${API_URL}/admin/abogado`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
            alert(res.ok ? 'Datos guardados' : 'Error');
        }

        async function guardarConfiguracion() {
            const data = { colores: { dorado: document.getElementById('colorDorado').value, azul: document.getElementById('colorAzul').value }, textos: { hero_titulo: document.getElementById('heroTitulo').value, hero_subtitulo: document.getElementById('heroSubtitulo').value } };
            const res = await fetch(`${API_URL}/admin/configuracion`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
            alert(res.ok ? 'Configuración guardada' : 'Error');
        }

        function cerrarSesion() { localStorage.clear(); window.location.href = '/login.html'; }
        cargarConfiguracion();
    </script>
</body>
</html>
