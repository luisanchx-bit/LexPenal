<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Ingeniero - LexPenal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <style>
        .ingeniero-container {
            max-width: 1400px;
            margin: 80px auto 2rem;
            padding: 2rem;
        }
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .tech-card {
            background: #0a0a0a;
            border-radius: 15px;
            border: 1px solid rgba(200, 169, 81, 0.3);
            padding: 1.5rem;
        }
        .tech-card:hover {
            border-color: #C8A951;
        }
        .tech-card h3 {
            color: #C8A951;
            margin-bottom: 1rem;
            border-left: 3px solid #C8A951;
            padding-left: 0.8rem;
        }
        .tech-card .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            margin: 1rem 0;
        }
        .tech-card .label {
            color: #888;
            font-size: 0.8rem;
        }
        .btn-tech {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 1px solid #C8A951;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: #C8A951;
            width: 100%;
            margin-top: 0.5rem;
        }
        .btn-tech:hover {
            background: #C8A951;
            color: #000;
        }
        .btn-danger {
            border-color: #8B0000;
            color: #8B0000;
        }
        .btn-danger:hover {
            background: #8B0000;
            color: #fff;
        }
        .log-container {
            background: #050505;
            border-radius: 10px;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .log-entry {
            padding: 0.3rem;
            border-bottom: 1px solid #222;
            color: #0f0;
        }
        .log-entry.error { color: #f00; }
        .log-entry.warning { color: #ff0; }
        @media (max-width: 768px) {
            .tech-grid { grid-template-columns: 1fr; }
            .ingeniero-container { padding: 1rem; margin-top: 70px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" style="cursor:pointer" onclick="window.location.href='/'"><h2>⚖️ LexPenal</h2></div>
            <div class="user-info">
                <span id="nombreIngeniero" style="color:#C8A951;">Cargando...</span>
                <button onclick="cerrarSesion()" class="btn-cerrar" style="margin-left:1rem">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="ingeniero-container">
        <h1 style="color:#C8A951; margin-bottom:1.5rem;">🔧 Panel de Ingeniero Técnico</h1>
        
        <div class="tech-grid">
            <div class="tech-card">
                <h3>🖥️ Estado del Servidor</h3>
                <div class="label">Status</div>
                <div class="value" id="serverStatus">🟢 Verificando...</div>
                <button class="btn-tech" onclick="verificarServidor()">🔄 Verificar Estado</button>
            </div>
            
            <div class="tech-card">
                <h3>🗄️ Base de Datos</h3>
                <div class="label">Total de registros</div>
                <div class="value" id="dbCount">-</div>
                <div class="label">Consultas / Citas</div>
                <div class="value" id="dbDetails">-</div>
                <button class="btn-tech" onclick="respaldarDB()">💾 Respaldar Base de Datos</button>
            </div>
            
            <div class="tech-card">
                <h3>📋 Logs del Sistema</h3>
                <div class="log-container" id="logsContainer">
                    <div class="log-entry">🟢 Sistema iniciado</div>
                </div>
                <button class="btn-tech" onclick="descargarLogs()">📥 Descargar Logs</button>
                <button class="btn-tech btn-danger" onclick="limpiarLogs()">🗑️ Limpiar Logs</button>
            </div>
            
            <div class="tech-card">
                <h3>☁️ Supabase Storage</h3>
                <div class="label">URL del proyecto</div>
                <div class="value" style="font-size:0.7rem;" id="supabaseUrl">-</div>
                <button class="btn-tech" onclick="verSupabase()">🔗 Ver en Supabase</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const API_URL = API_BASE_URL + '/api';
        let token = localStorage.getItem('token');
        let rol = localStorage.getItem('rol');
        
        if (!token || rol !== 'ingeniero') {
            window.location.href = '/login-ingeniero.html';
        }
        
        document.getElementById('nombreIngeniero').textContent = localStorage.getItem('nombre') || 'Ingeniero';
        
        async function verificarServidor() {
            document.getElementById('serverStatus').innerHTML = '🟡 Verificando...';
            try {
                const res = await fetch(API_URL + '/admin/dashboard', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    document.getElementById('serverStatus').innerHTML = '🟢 Servidor OK';
                    agregarLog('Servidor verificado');
                } else {
                    document.getElementById('serverStatus').innerHTML = '🔴 Error';
                    agregarLog('Error al verificar servidor', 'error');
                }
            } catch(e) {
                document.getElementById('serverStatus').innerHTML = '🔴 Servidor caído';
                agregarLog('Servidor no responde', 'error');
            }
        }
        
        async function cargarEstadisticas() {
            try {
                const res = await fetch(API_URL + '/admin/dashboard', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                document.getElementById('dbCount').textContent = (data.total_consultas || 0) + (data.total_citas || 0);
                document.getElementById('dbDetails').textContent = `${data.total_consultas || 0} consultas, ${data.total_citas || 0} citas`;
                document.getElementById('supabaseUrl').textContent = 'https://fxfwcfanzqnegdyheklv.supabase.co';
                agregarLog('Estadísticas cargadas');
            } catch(e) {
                agregarLog('Error al cargar estadísticas', 'error');
            }
        }
        
        async function respaldarDB() {
            agregarLog('Iniciando respaldo...');
            try {
                const res = await fetch(API_URL + '/exportar/excel?token=' + token);
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `backup_lexpenal_${Date.now()}.xlsx`;
                    a.click();
                    agregarLog('Respaldo completado');
                } else {
                    agregarLog('Error en respaldo', 'error');
                }
            } catch(e) {
                agregarLog('Error en respaldo', 'error');
            }
        }
        
        function verSupabase() {
            window.open('https://supabase.com/dashboard/projects', '_blank');
            agregarLog('Abriendo Supabase');
        }
        
        function descargarLogs() {
            const logs = document.getElementById('logsContainer').innerHTML;
            const blob = new Blob([logs], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `logs_${Date.now()}.html`;
            a.click();
            agregarLog('Logs descargados');
        }
        
        function limpiarLogs() {
            if (confirm('¿Limpiar logs?')) {
                document.getElementById('logsContainer').innerHTML = '<div class="log-entry">🟢 Logs reiniciados</div>';
                agregarLog('Logs limpiados');
            }
        }
        
        function agregarLog(mensaje, tipo = 'info') {
            const container = document.getElementById('logsContainer');
            const time = new Date().toLocaleTimeString();
            const clase = tipo === 'error' ? 'error' : '';
            container.innerHTML += `<div class="log-entry ${clase}">[${time}] ${mensaje}</div>`;
            container.scrollTop = container.scrollHeight;
        }
        
        function cerrarSesion() {
            localStorage.clear();
            window.location.href = '/login-ingeniero.html';
        }
        
        verificarServidor();
        cargarEstadisticas();
        
        window.verificarServidor = verificarServidor;
        window.respaldarDB = respaldarDB;
        window.verSupabase = verSupabase;
        window.descargarLogs = descargarLogs;
        window.limpiarLogs = limpiarLogs;
        window.cerrarSesion = cerrarSesion;
    </script>
</body>
</html>
