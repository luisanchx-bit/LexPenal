<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard - Admin LexPenal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar {
            transition: transform 0.3s ease;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1001;
                width: 260px;
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0 !important;
                padding: 1rem;
                margin-top: 60px;
            }
            .menu-toggle-btn {
                display: block !important;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1002;
                background: #C8A951;
                border: none;
                color: #000;
                font-size: 1.5rem;
                padding: 0.5rem 0.8rem;
                border-radius: 8px;
                cursor: pointer;
            }
            .stats-grid {
                grid-template-columns: 1fr !important;
            }
            .chart-container {
                grid-template-columns: 1fr !important;
            }
            .export-buttons {
                flex-direction: column;
            }
        }
        @media (min-width: 769px) {
            .menu-toggle-btn {
                display: none;
            }
            .main-content {
                margin-left: 280px;
            }
        }
        .menu-toggle-btn {
            display: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #0a0a0a;
            padding: 1rem;
            border-radius: 15px;
            border-left: 3px solid #C8A951;
        }
        .stat-card h3 {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #C8A951;
        }
        .chart-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .chart-card {
            background: #0a0a0a;
            padding: 1rem;
            border-radius: 15px;
            border: 1px solid rgba(200,169,81,0.3);
        }
        .chart-card h3 {
            color: #C8A951;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        canvas {
            max-height: 250px;
        }
        .export-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .btn-export {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 1px solid #C8A951;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            color: #C8A951;
            font-weight: bold;
        }
        .btn-export:hover {
            background: #C8A951;
            color: #000;
        }
        .table-container {
            overflow-x: auto;
            margin-top: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid #222;
        }
        th {
            color: #C8A951;
        }
        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .badge-pendiente { background: #ff9800; color: #000; }
        .badge-en_proceso { background: #2196f3; color: #fff; }
        .badge-resuelto { background: #4caf50; color: #fff; }
    </style>
</head>
<body>
    <button class="menu-toggle-btn" id="menuToggleBtn">☰</button>
    
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo" style="cursor:pointer" onclick="window.location.href='/admin/index.html'">
                <h2>⚖️ LexPenal</h2>
                <p>Panel de Control</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin/index.html" class="active">📊 Dashboard</a>
                <a href="/admin/citas.html">📅 Citas y Consultas</a>
                <a href="/admin/plantillas.html">
