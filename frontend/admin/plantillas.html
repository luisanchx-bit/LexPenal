<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestión de Plantillas - Admin LexPenal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <style>
        .sidebar {
            transition: transform 0.3s ease;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1001;
                width: 260px;
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0 !important;
                padding: 1rem;
                margin-top: 60px;
            }
            .menu-toggle-btn {
                display: block !important;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1002;
                background: #C8A951;
                border: none;
                color: #000;
                font-size: 1.5rem;
                padding: 0.5rem 0.8rem;
                border-radius: 8px;
                cursor: pointer;
            }
            .table-container {
                overflow-x: auto;
            }
            table {
                font-size: 0.8rem;
            }
            th, td {
                padding: 0.5rem !important;
            }
        }
        @media (min-width: 769px) {
            .menu-toggle-btn {
                display: none;
            }
            .main-content {
                margin-left: 280px;
            }
        }
        .menu-toggle-btn {
            display: none;
        }
        .upload-area {
            border: 2px dashed #C8A951;
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: rgba(200, 169, 81, 0.1);
        }
        .campo-tag {
            background: #C8A951;
            color: #000;
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            font-size: 0.7rem;
            display: inline-block;
            margin: 0.2rem;
        }
    </style>
</head>
<body>
    <button class="menu-toggle-btn" id="menuToggleBtn">☰</button>
    
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo" style="cursor:pointer" onclick="window.location.href='/admin/index.html'">
                <h2>⚖️ LexPenal</h2>
                <p>Panel de Control</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin/index.html">📊 Dashboard</a>
                <a href="/admin/citas.html">📅 Citas y Consultas</a>
                <a href="/admin/plantillas.html" class="active">📄 Plantillas</a>
                <a href="/admin/configuracion.html">⚙️ Configuración</a>
                <a href="/calculadora.html" target="_blank" style="border-top: 1px solid rgba(200,169,81,0.3); margin-top: 1rem; padding-top: 1rem;">⚖️ Calculadora de Penas</a>
            </nav>
            <div class="sidebar-footer">
                <p>Dr. Asmairo Conde Torres</p>
                <p><button onclick="cerrarSesion()" class="btn-logout" style="margin-top:1rem">Cerrar sesión</button></p>
            </div>
        </aside>

        <main class="main-content">
            <div class="admin-header">
                <h1>📄 Gestión de Plantillas</h1>
                <button class="btn-primary" onclick="abrirModalSubir()">📤 Subir Plantilla (.txt)</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Nombre</th><th>Clave</th><th>Campos</th><th>Fecha</th><th>Acciones</th></tr>
                    </thead>
                    <tbody id="listaPlantillas">
                        <tr><td colspan="6">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modalSubir" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3>Subir Plantilla (.txt)</h3>
                <button class="close-modal" onclick="cerrarModalSubir()">&times;</button>
            </div>
            <div class="upload-area" id="uploadArea">
                <div style="font-size: 2rem;">📄</div>
                <p>Haz clic para seleccionar un archivo .txt</p>
                <input type="file" id="archivoInput" accept=".txt" style="display:none;">
            </div>
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" id="nombrePlantilla" placeholder="Ej: Apelación de Comparendo">
            </div>
            <div class="form-group">
                <label>Clave única *</label>
                <input type="text" id="clavePlantilla" placeholder="Ej: apelacion_comparendo">
            </div>
            <button class="btn-primary" id="btnSubir" onclick="subirPlantilla()" style="width:100%;">💾 Guardar Plantilla</button>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        let archivoSeleccionado = null;

        if (!token) window.location.href = '/login.html';

        // Menú responsive
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        menuToggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('mobile-open');
        });
        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('mobile-open');
            });
        });

        async function cargarPlantillas() {
            const res = await fetch(`${API_URL}/plantillas`, { headers: { 'Authorization': `Bearer ${token}` } });
            const plantillas = await res.json();
            const tbody = document.getElementById('listaPlantillas');
            if (plantillas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No hay plantillas. Sube tu primer archivo .txt!</td></tr>';
                return;
            }
            tbody.innerHTML = plantillas.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td><strong>${p.nombre}</strong></td>
                    <td><code>${p.clave}</code></td>
                    <td>${p.campos_editables.map(c => `<span class="campo-tag">${c}</span>`).join('')}</td>
                    <td>${p.fecha_creacion}</td>
                    <td><button class="btn-danger" onclick="eliminarPlantilla(${p.id})">🗑️</button></td>
                </tr>
            `).join('');
        }

        function abrirModalSubir() {
            document.getElementById('modalSubir').style.display = 'flex';
            document.getElementById('nombrePlantilla').value = '';
            document.getElementById('clavePlantilla').value = '';
            archivoSeleccionado = null;
            document.getElementById('uploadArea').innerHTML = '<div style="font-size:2rem;">📄</div><p>Haz clic para seleccionar un archivo .txt</p><input type="file" id="archivoInput" accept=".txt" style="display:none;">';
        }

        function cerrarModalSubir() { document.getElementById('modalSubir').style.display = 'none'; }

        document.getElementById('uploadArea').addEventListener('click', () => document.getElementById('archivoInput').click());
        document.getElementById('archivoInput').addEventListener('change', (e) => { if (e.target.files[0]) procesarArchivo(e.target.files[0]); });

        function procesarArchivo(file) {
            if (!file.name.endsWith('.txt')) { alert('Solo se aceptan archivos .txt'); return; }
            archivoSeleccionado = file;
            document.getElementById('uploadArea').innerHTML = `<div style="font-size:2rem;">✅</div><p>${file.name}</p><p>${(file.size / 1024).toFixed(2)} KB</p>`;
        }

        async function subirPlantilla() {
            const nombre = document.getElementById('nombrePlantilla').value;
            const clave = document.getElementById('clavePlantilla').value;
            if (!nombre || !clave) { alert('Complete todos los campos'); return; }
            if (!archivoSeleccionado) { alert('Seleccione un archivo .txt'); return; }

            const formData = new FormData();
            formData.append('archivo', archivoSeleccionado);
            formData.append('nombre', nombre);
            formData.append('clave', clave);

            const btn = document.getElementById('btnSubir');
            btn.innerHTML = '⏳ Guardando...';
            btn.disabled = true;

            const res = await fetch(`${API_URL}/plantillas/subir`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                alert(`✅ Plantilla "${nombre}" guardada!\nCampos: ${data.campos_detectados.join(', ')}`);
                cerrarModalSubir();
                cargarPlantillas();
            } else {
                alert('❌ Error: ' + data.error);
                btn.innerHTML = '💾 Guardar Plantilla';
                btn.disabled = false;
            }
        }

        async function eliminarPlantilla(id) { if (confirm('¿Eliminar?')) { await fetch(`${API_URL}/plantillas/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); cargarPlantillas(); } }
        function cerrarSesion() { localStorage.clear(); window.location.href = '/login.html'; }
        cargarPlantillas();
    </script>
</body>
</html>
