<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Documento - LexPenal</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <style>
        .documento-preview {
            background: #0a0a0a;
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 4px solid #C8A951;
            margin-top: 2rem;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 500px;
            overflow-y: auto;
        }
        .campo-obligatorio {
            color: #C8A951;
            font-size: 0.8rem;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
        }
        .input-group input:focus, .input-group textarea:focus {
            border-color: #C8A951;
            outline: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" style="cursor: pointer;" onclick="window.location.href='/'">
                <h2>⚖️ LexPenal</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="/">Inicio</a></li>
                <li><a href="/login.html">Acceder</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width: 900px; margin: 4rem auto;">
        <h1 style="color: #C8A951; text-align: center;">📄 Generar Documento Legal</h1>
        
        <div id="infoDelito" style="background: #0a0a0a; padding: 1rem; border-radius: 10px; margin: 2rem 0;">
            <p><strong>Documento a generar:</strong> <span id="delitoSeleccionado" style="color:#C8A951;">Cargando...</span></p>
        </div>

        <div id="cargando" style="text-align: center; padding: 2rem;">
            <p>Cargando plantilla...</p>
        </div>

        <div id="formContainer" style="display: none;">
            <div id="camposDinamicos"></div>
        </div>

        <div id="resultado" style="margin-top: 2rem;">
            <h3 style="color: #C8A951;">📄 Documento Generado (Vista Previa)</h3>
            <div id="documentoPreview" class="documento-preview"></div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button class="btn-principal" onclick="enviarWhatsApp()">📱 Enviar al Abogado</button>
                <button class="btn-logout" onclick="descargarDocumento()">💾 Descargar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let plantillaActual = null;
        let documentoActual = '';

        const delito = localStorage.getItem('delito') || 'general';
        const tipo = localStorage.getItem('tipo') || 'general';
        const clavePlantilla = `${delito}_${tipo}`;

        async function cargarPlantilla() {
            try {
                const res = await fetch(`${API_URL}/plantillas/public/${clavePlantilla}`);
                if (res.ok) {
                    plantillaActual = await res.json();
                    document.getElementById('delitoSeleccionado').textContent = plantillaActual.nombre;
                    generarFormulario();
                } else {
                    document.getElementById('delitoSeleccionado').textContent = `Documento: ${delito} - ${tipo}`;
                    generarFormularioGenerico();
                }
                document.getElementById('cargando').style.display = 'none';
                document.getElementById('formContainer').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                generarFormularioGenerico();
                document.getElementById('cargando').style.display = 'none';
                document.getElementById('formContainer').style.display = 'block';
            }
        }

        function generarFormulario() {
            const container = document.getElementById('camposDinamicos');
            const campos = plantillaActual.campos_editables || ['NOMBRE_CLIENTE', 'CEDULA_CLIENTE', 'DESCRIPCION_HECHOS'];
            
            let html = '<h3 style="color:#C8A951;">📝 Complete la información</h3>';
            
            campos.forEach(campo => {
                const label = campo.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
                switch(campo) {
                    case 'NOMBRE_CLIENTE':
                        html += `
                            <div class="input-group">
                                <label>${label} *</label>
                                <input type="text" id="${campo}" placeholder="Ej: Juan Pérez" oninput="actualizarDocumento()">
                            </div>
                        `;
                        break;
                    case 'CEDULA_CLIENTE':
                        html += `
                            <div class="input-group">
                                <label>${label} *</label>
                                <input type="text" id="${campo}" placeholder="Ej: 12345678" oninput="actualizarDocumento()">
                            </div>
                        `;
                        break;
                    case 'DESCRIPCION_HECHOS':
                        html += `
                            <div class="input-group">
                                <label>${label} *</label>
                                <textarea id="${campo}" rows="6" placeholder="Describe detalladamente los hechos..." oninput="actualizarDocumento()"></textarea>
                            </div>
                        `;
                        break;
                    default:
                        html += `
                            <div class="input-group">
                                <label>${label}</label>
                                <input type="text" id="${campo}" oninput="actualizarDocumento()">
                            </div>
                        `;
                }
            });
            
            container.innerHTML = html;
            actualizarDocumento();
        }

        function generarFormularioGenerico() {
            const container = document.getElementById('camposDinamicos');
            container.innerHTML = `
                <h3 style="color:#C8A951;">📝 Complete la información</h3>
                <div class="input-group">
                    <label>Nombre completo *</label>
                    <input type="text" id="NOMBRE_CLIENTE" placeholder="Ej: Juan Pérez" oninput="actualizarDocumentoGenerico()">
                </div>
                <div class="input-group">
                    <label>Número de cédula *</label>
                    <input type="text" id="CEDULA_CLIENTE" placeholder="Ej: 12345678" oninput="actualizarDocumentoGenerico()">
                </div>
                <div class="input-group">
                    <label>Descripción de los hechos *</label>
                    <textarea id="DESCRIPCION_HECHOS" rows="6" placeholder="Describe detalladamente los hechos..." oninput="actualizarDocumentoGenerico()"></textarea>
                </div>
                <div class="input-group">
                    <label>Ciudad</label>
                    <input type="text" id="CIUDAD" value="Bogotá D.C." oninput="actualizarDocumentoGenerico()">
                </div>
            `;
            actualizarDocumentoGenerico();
        }

        function actualizarDocumento() {
            if (!plantillaActual) return;
            
            let documento = plantillaActual.cuerpo;
            const fecha = new Date().toLocaleDateString('es-CO');
            
            plantillaActual.campos_editables.forEach(campo => {
                const input = document.getElementById(campo);
                const valor = input ? input.value : '';
                documento = documento.replace(new RegExp(`\\[${campo}\\]`, 'g'), valor || `[${campo}]`);
            });
            
            documento = documento.replace(/\[FECHA\]/g, fecha);
            documento = `${plantillaActual.titulo}\n\n${documento}`;
            
            document.getElementById('documentoPreview').innerHTML = documento.replace(/\n/g, '<br>');
            window.documentoActual = documento;
        }

        function actualizarDocumentoGenerico() {
            const nombre = document.getElementById('NOMBRE_CLIENTE')?.value || '';
            const cedula = document.getElementById('CEDULA_CLIENTE')?.value || '';
            const hechos = document.getElementById('DESCRIPCION_HECHOS')?.value || '';
            const ciudad = document.getElementById('CIUDAD')?.value || 'Bogotá D.C.';
            const fecha = new Date().toLocaleDateString('es-CO');
            
            let documento = `DOCUMENTO LEGAL\n\n${ciudad}, ${fecha}\n\nYo, ${nombre || '[NOMBRE]'}, identificado con cédula No. ${cedula || '[CEDULA]'}, manifiesto:\n\nHECHOS:\n${hechos || '[DESCRIPCIÓN DE HECHOS]'}\n\nAtentamente,\n${nombre || '[NOMBRE]'}`;
            
            document.getElementById('documentoPreview').innerHTML = documento.replace(/\n/g, '<br>');
            window.documentoActual = documento;
        }

        function descargarDocumento() {
            const blob = new Blob([window.documentoActual], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `documento_${Date.now()}.txt`;
            link.click();
        }

        function enviarWhatsApp() {
            const mensaje = encodeURIComponent(`📄 DOCUMENTO LEGAL GENERADO\n\n${window.documentoActual.substring(0, 2000)}...\n\nDocumento completo disponible para descargar.`);
            window.open(`https://wa.me/573145879875?text=${mensaje}`, '_blank');
        }

        cargarPlantilla();
    </script>
</body>
            </html>
