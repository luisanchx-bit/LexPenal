<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Documento - LexPenal</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <style>
        .documento-preview {
            background: #0a0a0a;
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 4px solid #C8A951;
            margin-top: 2rem;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .campo-obligatorio {
            color: #C8A951;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" style="cursor: pointer;" onclick="window.location.href='/'">
                <h2>⚖️ LexPenal</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="/">Inicio</a></li>
                <li><a href="/login.html">Acceder</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width: 800px; margin: 4rem auto;">
        <h1 style="color: #C8A951; text-align: center;">📄 Generar Documento Legal</h1>
        
        <div id="infoDelito" style="background: #0a0a0a; padding: 1rem; border-radius: 10px; margin: 2rem 0;">
            <p><strong>Documento a generar:</strong> <span id="delitoSeleccionado" style="color:#C8A951;">Cargando...</span></p>
        </div>

        <div id="cargando" style="text-align: center; padding: 2rem;">
            <p>Cargando plantilla...</p>
        </div>

        <div id="formContainer" style="display: none;">
            <form id="formDocumento">
                <div id="camposDinamicos"></div>
                <button type="submit" class="btn-enviar" style="width:100%;">📄 Generar Documento</button>
            </form>
        </div>

        <div id="resultado" style="margin-top: 2rem; display: none;">
            <h3 style="color: #C8A951;">Documento Generado</h3>
            <div id="documentoPreview" class="documento-preview"></div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button class="btn-principal" onclick="descargarDocumento()">💾 Descargar Documento</button>
                <button class="btn-logout" onclick="contactarAbogado()">📱 Enviar al Abogado</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let plantillaActual = null;
        let documentoGenerado = '';

        const delito = localStorage.getItem('delito') || 'general';
        const tipo = localStorage.getItem('tipo') || 'general';
        const clavePlantilla = `${delito}_${tipo}`;

        async function cargarPlantilla() {
            try {
                const res = await fetch(`${API_URL}/plantillas/public/${clavePlantilla}`);
                if (res.ok) {
                    plantillaActual = await res.json();
                    document.getElementById('delitoSeleccionado').textContent = plantillaActual.nombre;
                    generarFormulario();
                } else {
                    document.getElementById('delitoSeleccionado').textContent = `Documento: ${delito} - ${tipo}`;
                    generarFormularioGenerico();
                }
                document.getElementById('cargando').style.display = 'none';
                document.getElementById('formContainer').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                generarFormularioGenerico();
                document.getElementById('cargando').style.display = 'none';
                document.getElementById('formContainer').style.display = 'block';
            }
        }

        function generarFormulario() {
            const container = document.getElementById('camposDinamicos');
            const campos = plantillaActual.campos_editables || ['NOMBRE_CLIENTE', 'CEDULA_CLIENTE', 'DESCRIPCION_HECHOS'];
            
            let html = '';
            
            campos.forEach(campo => {
                switch(campo) {
                    case 'NOMBRE_CLIENTE':
                        html += `
                            <div class="input-group">
                                <label>Tu nombre completo *</label>
                                <input type="text" id="NOMBRE_CLIENTE" required>
                            </div>
                        `;
                        break;
                    case 'CEDULA_CLIENTE':
                        html += `
                            <div class="input-group">
                                <label>Número de cédula *</label>
                                <input type="text" id="CEDULA_CLIENTE" required>
                            </div>
                        `;
                        break;
                    case 'DESCRIPCION_HECHOS':
                        html += `
                            <div class="input-group">
                                <label>Descripción de los hechos *</label>
                                <textarea id="DESCRIPCION_HECHOS" rows="6" placeholder="Describe detalladamente los hechos..." required></textarea>
                            </div>
                        `;
                        break;
                    case 'CIUDAD':
                        html += `
                            <div class="input-group">
                                <label>Ciudad</label>
                                <input type="text" id="CIUDAD" value="Bogotá D.C.">
                            </div>
                        `;
                        break;
                    case 'ENTIDAD':
                        html += `
                            <div class="input-group">
                                <label>Entidad destinataria</label>
                                <input type="text" id="ENTIDAD" placeholder="Ej: Juzgado 10 Penal Municipal">
                            </div>
                        `;
                        break;
                    case 'NUMERO_RADICADO':
                        html += `
                            <div class="input-group">
                                <label>Número de radicado</label>
                                <input type="text" id="NUMERO_RADICADO" placeholder="Ej: 2026-00123">
                            </div>
                        `;
                        break;
                }
            });
            
            container.innerHTML = html;
        }

        function generarFormularioGenerico() {
            const container = document.getElementById('camposDinamicos');
            container.innerHTML = `
                <div class="input-group">
                    <label>Tu nombre completo *</label>
                    <input type="text" id="NOMBRE_CLIENTE" required>
                </div>
                <div class="input-group">
                    <label>Número de cédula *</label>
                    <input type="text" id="CEDULA_CLIENTE" required>
                </div>
                <div class="input-group">
                    <label>Descripción de los hechos *</label>
                    <textarea id="DESCRIPCION_HECHOS" rows="6" placeholder="Describe detalladamente los hechos..." required></textarea>
                </div>
                <div class="input-group">
                    <label>Ciudad</label>
                    <input type="text" id="CIUDAD" value="Bogotá D.C.">
                </div>
            `;
        }

        document.getElementById('formDocumento').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('NOMBRE_CLIENTE')?.value || '';
            const cedula = document.getElementById('CEDULA_CLIENTE')?.value || '';
            const hechos = document.getElementById('DESCRIPCION_HECHOS')?.value || '';
            const ciudad = document.getElementById('CIUDAD')?.value || 'Bogotá D.C.';
            const entidad = document.getElementById('ENTIDAD')?.value || 'Autoridad Competente';
            const numeroRadicado = document.getElementById('NUMERO_RADICADO')?.value || '';
            const fecha = new Date().toLocaleDateString('es-CO');
            
            let documento = '';
            
            if (plantillaActual) {
                documento = plantillaActual.cuerpo
                    .replace(/\[NOMBRE_CLIENTE\]/g, nombre)
                    .replace(/\[CEDULA_CLIENTE\]/g, cedula)
                    .replace(/\[DESCRIPCION_HECHOS\]/g, hechos)
                    .replace(/\[CIUDAD\]/g, ciudad)
                    .replace(/\[FECHA\]/g, fecha)
                    .replace(/\[ENTIDAD\]/g, entidad)
                    .replace(/\[NUMERO_RADICADO\]/g, numeroRadicado);
                
                documento = `${plantillaActual.titulo}\n\n${documento}`;
            } else {
                documento = `DOCUMENTO LEGAL\n\n${ciudad}, ${fecha}\n\nYo, ${nombre}, identificado con cédula No. ${cedula}, manifiesto:\n\nHECHOS:\n${hechos}\n\nAtentamente,\n${nombre}`;
            }
            
            document.getElementById('documentoPreview').textContent = documento;
            document.getElementById('resultado').style.display = 'block';
            window.documentoGenerado = documento;
        });
        
        function descargarDocumento() {
            const blob = new Blob([window.documentoGenerado], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `documento_legal_${Date.now()}.txt`;
            link.click();
        }
        
        function contactarAbogado() {
            window.open('https://wa.me/573145879875?text=Necesito%20revisi%C3%B3n%20de%20un%20documento%20legal', '_blank');
        }

        cargarPlantilla();
    </script>
</body>
                                                              </html>
