<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita - LexPenal</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <style>
        .cita-container {
            max-width: 800px;
            margin: 100px auto 4rem;
            padding: 2rem;
            background: #0a0a0a;
            border-radius: 20px;
            border: 1px solid rgba(200, 169, 81, 0.3);
        }
        .calendario {
            background: #111;
            border-radius: 15px;
            padding: 1rem;
            margin: 1.5rem 0;
        }
        .calendario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0 0.5rem;
        }
        .calendario-mes {
            color: #C8A951;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .calendario-dias {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 0.5rem;
        }
        .dia-nombre {
            color: #888;
            font-size: 0.8rem;
            padding: 0.5rem;
        }
        .dia {
            padding: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: #1a1a1a;
            text-align: center;
        }
        .dia:hover:not(.ocupado):not(.disabled) {
            background: rgba(200, 169, 81, 0.2);
        }
        .dia.seleccionado {
            background: #C8A951;
            color: #000;
        }
        .dia.ocupado {
            background: #2a1a1a;
            color: #8B0000;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .dia.disabled {
            background: #0a0a0a;
            color: #333;
            cursor: not-allowed;
        }
        .horario-container {
            margin-top: 1rem;
            padding: 1rem;
            background: #0a0a0a;
            border-radius: 10px;
        }
        .horario-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        .hora-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.3s;
            color: #ccc;
        }
        .hora-btn:hover:not(.ocupada-hora) {
            background: rgba(200, 169, 81, 0.2);
            border-color: #C8A951;
        }
        .hora-btn.seleccionada-hora {
            background: #C8A951;
            color: #000;
            border-color: #C8A951;
        }
        .hora-btn.ocupada-hora {
            background: #2a1a1a;
            color: #8B0000;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .btn-agendar {
            background: #C8A951;
            color: #000;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 1rem;
        }
        .info-cita {
            background: #050505;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            text-align: center;
            border-left: 3px solid #C8A951;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #C8A951;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" style="cursor:pointer" onclick="window.location.href='/'"><h2>⚖️ LexPenal</h2></div>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-menu" id="navMenu"><li><a href="/">Inicio</a></li><li><a href="/login.html">Acceder</a></li></ul>
        </div>
    </nav>

    <div class="cita-container">
        <h1 style="color:#C8A951; text-align:center;">📅 Agendar Cita</h1>
        <p style="text-align:center; margin-bottom:1rem;">Seleccione una fecha y hora disponible</p>

        <form id="formCita">
            <div class="input-group"><label>Nombre completo *</label><input type="text" id="nombre" required></div>
            <div class="input-group"><label>Teléfono *</label><input type="tel" id="telefono" required></div>
            <div class="input-group"><label>Correo electrónico *</label><input type="email" id="email" required></div>
            <div class="input-group"><label>Motivo de la consulta *</label><textarea id="motivo" rows="3" required></textarea></div>

            <div class="calendario" id="calendario">
                <div class="calendario-header">
                    <button type="button" id="prevMes" style="background:none; border:none; color:#C8A951; cursor:pointer;">◀</button>
                    <span class="calendario-mes" id="mesActual"></span>
                    <button type="button" id="nextMes" style="background:none; border:none; color:#C8A951; cursor:pointer;">▶</button>
                </div>
                <div class="calendario-dias" id="diasSemana"></div>
                <div class="calendario-dias" id="diasMes"></div>
            </div>

            <div id="horarioContainer" class="horario-container" style="display:none;">
                <label>⏰ Seleccione una hora:</label>
                <div class="horario-grid" id="horarioGrid"></div>
            </div>

            <div id="fechaSeleccionada" class="info-cita"></div>
            <input type="hidden" id="fecha" required>
            <input type="hidden" id="hora" required>
            <button type="submit" class="btn-agendar">📅 Agendar Cita</button>
        </form>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const API_URL = API_BASE_URL + '/api';
        
        let fechaActual = new Date();
        let citasOcupadas = [];
        let fechaSeleccionada = null;
        let horaSeleccionada = null;
        
        const urlParams = new URLSearchParams(window.location.search);
        const tipoRama = urlParams.get('tipo') || 'general';

        // Horas disponibles (de 9am a 6pm)
        const horasDisponibles = ["09:00", "10:00", "11:00", "14:00", "15:00", "16:00", "17:00"];

        function getSaludo() {
            const hora = new Date().getHours();
            if (hora >= 6 && hora < 12) return "Buenos días";
            if (hora >= 12 && hora < 19) return "Buenas tardes";
            return "Buenas noches";
        }

        function formatearFecha(fecha) {
            const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
            return `${fecha.getDate()} de ${meses[fecha.getMonth()]} de ${fecha.getFullYear()}`;
        }

        async function cargarCitasOcupadas() {
            try {
                const res = await fetch(API_URL + '/citas/ocupadas');
                const data = await res.json();
                citasOcupadas = data;
                renderCalendario();
            } catch (error) {
                console.error('Error:', error);
                renderCalendario();
            }
        }

        function esFechaOcupada(fecha) {
            const fechaStr = fecha.toISOString().split('T')[0];
            return citasOcupadas.some(c => c.fecha === fechaStr);
        }

        function esHoraOcupada(fecha, hora) {
            const fechaStr = fecha.toISOString().split('T')[0];
            return citasOcupadas.some(c => c.fecha === fechaStr && c.hora === hora);
        }

        function renderCalendario() {
            const año = fechaActual.getFullYear();
            const mes = fechaActual.getMonth();
            
            const primerDia = new Date(año, mes, 1);
            const ultimoDia = new Date(año, mes + 1, 0);
            const diasEnMes = ultimoDia.getDate();
            let diaInicioSemana = primerDia.getDay();
            diaInicioSemana = diaInicioSemana === 0 ? 6 : diaInicioSemana - 1;
            
            const nombresMeses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            document.getElementById('mesActual').textContent = `${nombresMeses[mes]} ${año}`;
            
            const diasSemana = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
            document.getElementById('diasSemana').innerHTML = diasSemana.map(d => `<div class="dia-nombre">${d}</div>`).join('');
            
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);
            
            let diasHtml = '';
            for (let i = 0; i < diaInicioSemana; i++) diasHtml += `<div class="dia disabled"></div>`;
            
            for (let dia = 1; dia <= diasEnMes; dia++) {
                const fecha = new Date(año, mes, dia);
                const esOcupado = esFechaOcupada(fecha);
                const esPasado = fecha < hoy;
                const esSeleccionado = fechaSeleccionada && fecha.toDateString() === fechaSeleccionada.toDateString();
                
                let clase = 'dia';
                if (esPasado) clase += ' disabled';
                if (esOcupado) clase += ' ocupado';
                if (esSeleccionado) clase += ' seleccionado';
                
                diasHtml += `<div class="${clase}" onclick="${!esPasado && !esOcupado ? `seleccionarFecha(${dia}, ${mes}, ${año})` : ''}">${dia}</div>`;
            }
            document.getElementById('diasMes').innerHTML = diasHtml;
        }
        
        function seleccionarFecha(dia, mes, año) {
            fechaSeleccionada = new Date(año, mes, dia);
            const fechaISO = fechaSeleccionada.toISOString().split('T')[0];
            document.getElementById('fecha').value = fechaISO;
            document.getElementById('fechaSeleccionada').innerHTML = `📅 Fecha seleccionada: ${dia} de ${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][mes]} de ${año}`;
            
            // Mostrar selector de horas
            document.getElementById('horarioContainer').style.display = 'block';
            renderHorario();
            renderCalendario();
        }
        
        function renderHorario() {
            const container = document.getElementById('horarioGrid');
            if (!fechaSeleccionada) return;
            
            container.innerHTML = horasDisponibles.map(hora => {
                const ocupada = esHoraOcupada(fechaSeleccionada, hora);
                const seleccionada = horaSeleccionada === hora;
                let clase = 'hora-btn';
                if (ocupada) clase += ' ocupada-hora';
                if (seleccionada) clase += ' seleccionada-hora';
                return `<div class="${clase}" onclick="${!ocupada ? `seleccionarHora('${hora}')` : ''}">${hora}</div>`;
            }).join('');
        }
        
        function seleccionarHora(hora) {
            horaSeleccionada = hora;
            document.getElementById('hora').value = hora;
            document.getElementById('fechaSeleccionada').innerHTML = `📅 Fecha seleccionada: ${formatearFecha(fechaSeleccionada)} a las ${hora}`;
            renderHorario();
        }
        
        document.getElementById('prevMes').addEventListener('click', () => {
            fechaActual.setMonth(fechaActual.getMonth() - 1);
            fechaSeleccionada = null;
            horaSeleccionada = null;
            document.getElementById('horarioContainer').style.display = 'none';
            renderCalendario();
        });
        
        document.getElementById('nextMes').addEventListener('click', () => {
            fechaActual.setMonth(fechaActual.getMonth() + 1);
            fechaSeleccionada = null;
            horaSeleccionada = null;
            document.getElementById('horarioContainer').style.display = 'none';
            renderCalendario();
        });
        
        document.getElementById('formCita').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            const email = document.getElementById('email').value;
            const motivo = document.getElementById('motivo').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            
            if (!nombre || !telefono || !email || !motivo || !fecha || !hora) {
                alert('Por favor complete todos los campos y seleccione fecha y hora');
                return;
            }
            
            const btn = document.querySelector('.btn-agendar');
            btn.innerHTML = '<span class="loading"></span> Agendando...';
            btn.disabled = true;
            
            try {
                const res = await fetch(API_URL + '/citas/nueva', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, telefono, email, motivo, fecha, hora, rama: tipoRama })
                });
                const data = await res.json();
                if (data.success) {
                    const saludo = getSaludo();
                    const ramaTexto = { penal: 'Derecho Penal', civil: 'Derecho Civil', victimas: 'Víctimas y Migrantes', jac: 'JAC y Veedurías' }[tipoRama] || 'Consulta Legal';
                    const fechaObj = new Date(fecha);
                    const mensajeWhatsApp = `${saludo}, soy ${nombre}. Mi cita en ${ramaTexto} ha sido agendada para el ${formatearFecha(fechaObj)} a las ${hora} con el código: ${data.codigo}. Quedo atento a su confirmación.`;
                    alert(`✅ Cita agendada para el ${fecha} a las ${hora}`);
                    window.open(`https://wa.me/573145879875?text=${encodeURIComponent(mensajeWhatsApp)}`, '_blank');
                    window.location.href = '/';
                } else {
                    alert('❌ Error: ' + data.error);
                    btn.innerHTML = '📅 Agendar Cita';
                    btn.disabled = false;
                }
            } catch (error) {
                alert('❌ Error de conexión');
                btn.innerHTML = '📅 Agendar Cita';
                btn.disabled = false;
            }
        });
        
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if (menuToggle) menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        
        cargarCitasOcupadas();
    </script>
</body>
</html>
