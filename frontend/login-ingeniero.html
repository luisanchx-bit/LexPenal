<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Ingeniero - LexPenal</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 100px auto;
            padding: 2rem;
            background: #0a0a0a;
            border-radius: 20px;
            border: 1px solid rgba(200, 169, 81, 0.3);
            position: relative;
            z-index: 10;
        }
        
        .dominio-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.95) 0%, rgba(0,0,0,1) 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.5s ease;
        }
        
        .dominio-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        
        .dominio-contenido {
            text-align: center;
            animation: expandir 2s ease-out;
        }
        
        @keyframes expandir {
            0% { transform: scale(0.1); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.2); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .dominio-texto {
            font-size: 3rem;
            font-weight: bold;
            color: #C8A951;
            text-shadow: 0 0 20px #C8A951;
            font-family: 'Playfair Display', serif;
        }
        
        .dominio-subtexto {
            font-size: 1.2rem;
            color: #fff;
            margin-top: 1rem;
        }
        
        @media (max-width: 768px) {
            .dominio-texto { font-size: 1.8rem; }
            .dominio-subtexto { font-size: 0.9rem; }
        }
        
        .btn-ingeniero {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 1px solid #C8A951;
            border-radius: 40px;
            padding: 0.8rem;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            color: #C8A951;
            transition: all 0.3s;
        }
        
        .btn-ingeniero:hover {
            background: #C8A951;
            color: #000;
        }
        
        .badge-ingeniero {
            display: inline-block;
            background: rgba(200, 169, 81, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body class="login-body">
    <div class="dominio-overlay" id="dominioOverlay">
        <div class="dominio-contenido">
            <div class="dominio-texto">⚡ EXPANSIÓN ⚡</div>
            <div class="dominio-texto" style="font-size: 2rem;">DE DOMINIO</div>
            <div class="dominio-subtexto">"Sentencia Mortal"</div>
        </div>
    </div>

    <div class="login-container">
        <div class="login-header" onclick="window.location.href='/'">
            <h2>⚖️ LexPenal</h2>
            <h3>Acceso Ingeniero</h3>
        </div>
        <div class="badge-ingeniero">🔧 Acceso restringido - Personal autorizado</div>
        
        <form id="loginForm" onsubmit="event.preventDefault(); iniciarSesion();">
            <div class="input-group">
                <label>Cédula</label>
                <input type="text" id="cedula" placeholder="1052041627" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-ingeniero" id="btnLogin">🔧 Acceder al Panel Técnico</button>
        </form>
        <div id="mensaje" class="mensaje"></div>
    </div>

    <script>
        const API_URL = '/api';
        
        function reproducirAudio() {
            const audio = new Audio('/assets/audio/dominio.mp3');
            audio.play().catch(e => console.log('Audio no disponible aún:', e));
        }
        
        function mostrarAnimacion() {
            return new Promise((resolve) => {
                const overlay = document.getElementById('dominioOverlay');
                overlay.classList.add('active');
                reproducirAudio();
                setTimeout(() => {
                    overlay.classList.remove('active');
                    resolve();
                }, 2500);
            });
        }
        
        async function iniciarSesion() {
            const cedula = document.getElementById('cedula').value;
            const contrasena = document.getElementById('password').value;
            const mensajeDiv = document.getElementById('mensaje');
            
            if (!cedula || !contrasena) {
                mostrarMensaje('Complete todos los campos', 'error');
                return;
            }
            
            await mostrarAnimacion();
            
            try {
                const response = await fetch(`${API_URL}/auth/login-ingeniero`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cedula, contrasena })
                });
                
                const data = await response.json();
                
                if (data.success && data.rol === 'ingeniero') {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('nombre', data.nombre);
                    localStorage.setItem('cedula', data.cedula);
                    localStorage.setItem('rol', data.rol);
                    
                    mostrarMensaje('¡Bienvenido Ingeniero!', 'exito');
                    setTimeout(() => {
                        window.location.href = '/admin/ingeniero.html';
                    }, 1500);
                } else {
                    mostrarMensaje('Credenciales incorrectas', 'error');
                }
            } catch (error) {
                mostrarMensaje('Error de conexión', 'error');
            }
        }
        
        function mostrarMensaje(texto, tipo) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.textContent = texto;
            mensajeDiv.className = `mensaje ${tipo}`;
            setTimeout(() => {
                mensajeDiv.textContent = '';
                mensajeDiv.className = 'mensaje';
            }, 3000);
        }
    </script>
</body>
</html>
