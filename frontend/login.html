<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LexPenal | Acceso Administrativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Playfair Display', 'Lato', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Fondo geométrico */
        .geometric-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .hexagon {
            width: 120px;
            height: 138px;
            background: rgba(200, 169, 81, 0.05);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 1px solid rgba(200, 169, 81, 0.3);
            position: absolute;
            animation: rotateSlow 30s infinite linear;
        }

        .circle-ring {
            position: absolute;
            border: 1px solid rgba(200, 169, 81, 0.15);
            border-radius: 50%;
            animation: pulseRing 8s infinite alternate;
        }

        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0.05; }
        }

        /* Login card */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            margin: 2rem;
            transition: filter 0.4s, opacity 0.6s;
        }

        .login-card {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(200, 169, 81, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            transition: 0.3s;
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #E4C580, #A67C2E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .justice-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 6px gold);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #C8A951;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a35;
            border-radius: 60px;
            color: #f0f0f0;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: #C8A951;
            box-shadow: 0 0 12px rgba(200, 169, 81, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #C8A951, #9E7F34);
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #020202;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #dbb95c, #b38f3a);
        }

        .mensaje {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 60px;
            text-align: center;
            font-size: 0.8rem;
        }

        .mensaje.exito {
            background: rgba(46, 125, 50, 0.2);
            border: 1px solid #2E7D32;
            color: #9eff9e;
        }

        .mensaje.error {
            background: rgba(198, 40, 40, 0.2);
            border: 1px solid #C62828;
            color: #ffa098;
        }

        /* Modal de bienvenida elegante */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.8s ease;
        }

        .welcome-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .welcome-card {
            text-align: center;
            max-width: 650px;
            width: 85%;
            padding: 2.5rem;
            background: linear-gradient(145deg, #0f0f1a, #07070f);
            border-radius: 48px;
            border: 1px solid #C8A951;
            box-shadow: 0 0 80px rgba(200, 169, 81, 0.2);
            animation: fadeSlideUp 0.8s ease-out;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-title {
            font-size: 2rem;
            font-family: 'Playfair Display', serif;
            color: #C8A951;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .welcome-message {
            font-size: 1.2rem;
            color: #e0e0e0;
            margin: 1.5rem 0;
            line-height: 1.6;
        }

        .personal-message {
            font-size: 1rem;
            color: #aaa;
            border-top: 1px solid #C8A95133;
            padding-top: 1rem;
            margin-top: 1rem;
            font-style: italic;
        }

        .welcome-footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #C8A951;
        }
    </style>
</head>
<body>

<div class="geometric-bg">
    <div class="hexagon" style="top: 10%; left: -20px;"></div>
    <div class="hexagon" style="bottom: 10%; right: -30px;"></div>
    <div class="circle-ring" style="top: 20%; left: -50px; width: 200px; height: 200px;"></div>
</div>

<div class="login-wrapper" id="loginWrapper">
    <div class="login-card">
        <div class="brand">
            <div class="justice-icon">⚖️</div>
            <h1>LEX PENAL</h1>
            <p>acceso restringido · solo personal autorizado</p>
        </div>
        <div class="input-group">
            <label>📜 NÚMERO DE CÉDULA</label>
            <input type="text" id="cedula" class="input-field" placeholder="1018457093">
        </div>
        <div class="input-group">
            <label>🔒 CONTRASEÑA</label>
            <input type="password" id="password" class="input-field" placeholder="••••••">
        </div>
        <button class="btn-login" id="btnLogin">🎖️ INGRESAR</button>
        <div id="mensaje" class="mensaje"></div>
    </div>
</div>

<div id="welcomeModal" class="welcome-overlay">
    <div class="welcome-card">
        <div class="welcome-title">⚖️ Bienvenido, Dr. Asmairo Conde Torres</div>
        <div class="welcome-message" id="dynamicMessage"></div>
        <div class="personal-message" id="personalMessage"></div>
        <div class="welcome-footer">⚡ La justicia no descansa ⚡</div>
    </div>
</div>

<script>
    const API_URL = '/api/auth';
    const loginWrapper = document.getElementById('loginWrapper');
    const welcomeModal = document.getElementById('welcomeModal');
    const dynamicMsg = document.getElementById('dynamicMessage');
    const personalMsg = document.getElementById('personalMessage');

    // Frases personalizadas según día/hora
    function getPersonalizedMessage() {
        const now = new Date();
        const hour = now.getHours();
        const day = now.getDay();

        let saludo = "";
        if (hour < 12) saludo = "Buenos días";
        else if (hour < 19) saludo = "Buenas tardes";
        else saludo = "Buenas noches";

        const diasSemana = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const nombreDia = diasSemana[day];

        const frasesPersonalizadas = [
            "Que la balanza de la justicia siempre esté a tu favor.",
            "Tu dedicación inspira confianza en cada caso.",
            "Hoy es un buen día para impartir justicia con excelencia.",
            "Cada cliente merece lo mejor de tu experiencia. Confiamos en ti.",
            "El derecho es tu herramienta, la ética tu brújula.",
            "Que tengas un día productivo lleno de victorias legales.",
            "La justicia te necesita, dr. Conde. Adelante."
        ];
        const fraseAleatoria = frasesPersonalizadas[Math.floor(Math.random() * frasesPersonalizadas.length)];

        return `${saludo}, Dr. Asmairo. Hoy es ${nombreDia}. ${fraseAleatoria}`;
    }

    function showWelcomeAndRedirect() {
        dynamicMsg.innerText = getPersonalizedMessage();
        personalMsg.innerText = "📅 " + new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        loginWrapper.style.opacity = "0";
        loginWrapper.style.filter = "blur(8px)";
        welcomeModal.classList.add('active');
        
        setTimeout(() => {
            window.location.href = "/admin/index.html";
        }, 4500);
    }

    async function iniciarSesion() {
        const cedula = document.getElementById('cedula').value.trim();
        const contrasena = document.getElementById('password').value.trim();
        const msgDiv = document.getElementById('mensaje');

        if (!cedula || !contrasena) {
            msgDiv.innerText = "❌ Complete todos los campos";
            msgDiv.className = "mensaje error";
            return;
        }

        const btn = document.getElementById('btnLogin');
        btn.disabled = true;
        btn.innerText = "⏳ VERIFICANDO...";

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cedula, contrasena })
            });
            const data = await response.json();

            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('cedula', data.cedula);
                localStorage.setItem('rol', data.rol);

                if (data.rol === 'super_admin') {
                    showWelcomeAndRedirect();
                } else if (data.rol === 'ingeniero') {
                    // Si quieres algo especial para ingeniero más adelante
                    window.location.href = "/admin/ingeniero.html";
                } else {
                    msgDiv.innerText = "✅ ACCESO CONCEDIDO";
                    msgDiv.className = "mensaje exito";
                    setTimeout(() => window.location.href = '/', 1000);
                }
            } else {
                msgDiv.innerText = "❌ " + (data.error || "Credenciales inválidas");
                msgDiv.className = "mensaje error";
                btn.disabled = false;
                btn.innerText = "INGRESAR";
            }
        } catch (err) {
            console.error(err);
            msgDiv.innerText = "⚠️ ERROR DE CONEXIÓN";
            msgDiv.className = "mensaje error";
            btn.disabled = false;
            btn.innerText = "INGRESAR";
        }
    }

    document.getElementById('btnLogin').addEventListener('click', iniciarSesion);
    document.getElementById('cedula').addEventListener('keypress', (e) => { if (e.key === 'Enter') iniciarSesion(); });
    document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') iniciarSesion(); });
</script>
</body>
</html>
