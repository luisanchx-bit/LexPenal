<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexPenal - Acceso</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header"><h2>⚖️ LexPenal</h2><h3>Acceso al sistema</h3></div>
            <div class="login-tabs">
                <button class="tab-btn active" onclick="mostrarTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="mostrarTab('registro')">Registrarse</button>
            </div>
            <div id="loginForm" class="tab-content active">
                <form onsubmit="event.preventDefault(); iniciarSesion();">
                    <div class="input-group"><label>Número de cédula</label><input type="text" id="loginCedula" placeholder="Ej: 12345678" required></div>
                    <div class="input-group"><label>Contraseña</label><input type="password" id="loginPassword" placeholder="••••••" required></div>
                    <button type="submit" class="btn-login-submit">Ingresar</button>
                </form>
            </div>
            <div id="registroForm" class="tab-content">
                <form onsubmit="event.preventDefault(); registrarse();">
                    <div class="input-group"><label>Número de cédula</label><input type="text" id="regCedula" placeholder="Ej: 12345678" required></div>
                    <div class="input-group"><label>Nombre completo</label><input type="text" id="regNombre" placeholder="Ej: Juan Pérez García" required></div>
                    <div class="input-group"><label>Contraseña</label><input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required></div>
                    <div class="input-group"><label>Confirmar contraseña</label><input type="password" id="regConfirmPassword" placeholder="Repite tu contraseña" required></div>
                    <button type="submit" class="btn-login-submit">Crear cuenta</button>
                </form>
            </div>
            <div id="mensaje" class="mensaje"></div>
        </div>
    </div>
    <script>
        const API_URL = 'http://localhost:3000/api/auth';
        function mostrarTab(tab) {
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registroForm').classList.toggle('active', tab === 'registro');
            document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'registro' && i === 1)));
        }
        async function iniciarSesion() {
            const cedula = document.getElementById('loginCedula').value;
            const contrasena = document.getElementById('loginPassword').value;
            if (!cedula || !contrasena) return mostrarMensaje('Complete todos los campos', 'error');
            try {
                const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cedula, contrasena }) });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token); localStorage.setItem('nombre', data.nombre); localStorage.setItem('cedula', data.cedula);
                    mostrarMensaje('¡Bienvenido!', 'exito');
                    setTimeout(() => window.location.href = 'cliente.html', 1500);
                } else mostrarMensaje(data.error, 'error');
            } catch (error) { mostrarMensaje('Error de conexión', 'error'); }
        }
        async function registrarse() {
            const cedula = document.getElementById('regCedula').value;
            const nombre = document.getElementById('regNombre').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            if (!cedula || !nombre || !password) return mostrarMensaje('Complete todos los campos', 'error');
            if (cedula.length < 6) return mostrarMensaje('Cédula mínimo 6 dígitos', 'error');
            if (password.length < 6) return mostrarMensaje('Contraseña mínimo 6 caracteres', 'error');
            if (password !== confirm) return mostrarMensaje('Las contraseñas no coinciden', 'error');
            try {
                const res = await fetch(`${API_URL}/registro`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cedula, nombre_completo: nombre, contrasena: password }) });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token); localStorage.setItem('nombre', data.nombre); localStorage.setItem('cedula', data.cedula);
                    mostrarMensaje('¡Registro exitoso!', 'exito');
                    setTimeout(() => window.location.href = 'cliente.html', 1500);
                } else mostrarMensaje(data.error, 'error');
            } catch (error) { mostrarMensaje('Error de conexión', 'error'); }
        }
        function mostrarMensaje(texto, tipo) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto; msg.className = `mensaje ${tipo}`;
            setTimeout(() => { msg.textContent = ''; msg.className = 'mensaje'; }, 3000);
        }
    </script>
</body>
</html>
