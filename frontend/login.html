<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LexPenal | Acceso al Sistema</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Playfair Display', 'Lato', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Fondo geométrico */
        .geometric-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .hexagon {
            width: 120px;
            height: 138px;
            background: rgba(200, 169, 81, 0.05);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 1px solid rgba(200, 169, 81, 0.3);
            position: absolute;
            animation: rotateSlow 30s infinite linear;
        }

        .circle-ring {
            position: absolute;
            border: 1px solid rgba(200, 169, 81, 0.15);
            border-radius: 50%;
            animation: pulseRing 8s infinite alternate;
        }

        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0.05; }
        }

        /* Login card */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 2rem;
            transition: filter 0.4s;
        }

        .login-card {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(200, 169, 81, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            border-color: rgba(200, 169, 81, 0.8);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #E4C580, #A67C2E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .justice-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 6px gold);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #C8A951;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a35;
            border-radius: 60px;
            color: #f0f0f0;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: #C8A951;
            box-shadow: 0 0 12px rgba(200, 169, 81, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #C8A951, #9E7F34);
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #020202;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #dbb95c, #b38f3a);
            box-shadow: 0 0 18px rgba(200, 169, 81, 0.6);
        }

        .mensaje {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 60px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .mensaje.exito {
            background: rgba(46, 125, 50, 0.2);
            border: 1px solid #2E7D32;
            color: #d4ffd4;
        }

        .mensaje.error {
            background: rgba(198, 40, 40, 0.2);
            border: 1px solid #C62828;
            color: #ffb7b7;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.65rem;
            color: #777;
        }

        @media (max-width: 550px) {
            .login-wrapper { margin: 1rem; }
            .login-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="geometric-bg">
    <div class="hexagon" style="top: 10%; left: -20px;"></div>
    <div class="hexagon" style="bottom: 10%; right: -30px;"></div>
    <div class="circle-ring" style="top: 20%; left: -50px; width: 200px; height: 200px;"></div>
</div>

<div class="login-wrapper" id="loginWrapper">
    <div class="login-card">
        <div class="brand">
            <div class="justice-icon">⚖️</div>
            <h1>LEX PENAL</h1>
            <p>acceso restringido · solo personal autorizado</p>
        </div>
        <form id="loginForm" onsubmit="event.preventDefault(); iniciarSesion();">
            <div class="input-group">
                <label>📜 NÚMERO DE CÉDULA</label>
                <input type="text" id="cedula" class="input-field" placeholder="Ej: 1018457093" required>
            </div>
            <div class="input-group">
                <label>🔒 CONTRASEÑA</label>
                <input type="password" id="password" class="input-field" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">🎖️ INGRESAR AL SISTEMA</button>
        </form>
        <div id="mensaje" class="mensaje"></div>
        <div class="footer-note">
            ⚖️ Administración de Justicia | Despacho Dr. Asmairo Conde
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/auth';
    
    async function iniciarSesion() {
        const cedula = document.getElementById('cedula').value.trim();
        const contrasena = document.getElementById('password').value.trim();
        const msgDiv = document.getElementById('mensaje');
        const btn = document.getElementById('btnLogin');
        
        if (!cedula || !contrasena) {
            msgDiv.innerText = "❌ Complete todos los campos";
            msgDiv.className = "mensaje error";
            return;
        }
        
        btn.disabled = true;
        btn.innerText = "⏳ VERIFICANDO CREDENCIALES...";
        msgDiv.innerText = "";
        msgDiv.className = "mensaje";
        
        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cedula, contrasena })
            });
            
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('cedula', data.cedula);
                localStorage.setItem('rol', data.rol);
                
                // ==============================================
                // INGENIERO - Redirige a Evangelion
                // ==============================================
                if (data.rol === 'ingeniero') {
                    msgDiv.innerText = "🔧 ACCESO INGENIERO - Desbloqueando dominio técnico...";
                    msgDiv.className = "mensaje exito";
                    setTimeout(() => {
                        window.location.replace('/evangelion-domain.html');
                    }, 1500);
                } 
                // ==============================================
                // ADMINISTRADOR - Mensaje claro y elegante
                // ==============================================
                else if (data.rol === 'super_admin') {
                    msgDiv.innerText = "👑 BIENVENIDO, DR. ASMAIRO CONDE TORRES\nAcceso al panel de administración concedido.";
                    msgDiv.className = "mensaje exito";
                    setTimeout(() => {
                        window.location.href = '/admin/index.html';
                    }, 1800);
                }
                // ==============================================
                // CLIENTE ESTÁNDAR
                // ==============================================
                else {
                    msgDiv.innerText = "✅ ACCESO CONCEDIDO. Redirigiendo al portal de servicios...";
                    msgDiv.className = "mensaje exito";
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                }
            } else {
                msgDiv.innerText = "❌ " + (data.error || "Credenciales inválidas");
                msgDiv.className = "mensaje error";
                btn.disabled = false;
                btn.innerText = "🎖️ INGRESAR AL SISTEMA";
            }
        } catch (error) {
            console.error(error);
            msgDiv.innerText = "⚠️ ERROR DE CONEXIÓN CON EL SERVIDOR";
            msgDiv.className = "mensaje error";
            btn.disabled = false;
            btn.innerText = "🎖️ INGRESAR AL SISTEMA";
        }
    }
    
    // Permitir Enter en inputs
    document.getElementById('cedula').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') iniciarSesion();
    });
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') iniciarSesion();
    });
</script>
</body>
</html>
