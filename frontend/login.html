<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LexPenal | Acceso al Sistema</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Playfair Display', 'Lato', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* ==================== FONDO GEOMÉTRICO DINÁMICO ==================== */
        .geometric-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .geo-shape {
            position: absolute;
            background: rgba(200, 169, 81, 0.08);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(200, 169, 81, 0.2);
            border-radius: 2px;
            animation: float 20s infinite alternate ease-in-out;
        }

        /* Hexágonos */
        .hexagon {
            width: 120px;
            height: 138px;
            background: rgba(200, 169, 81, 0.05);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 1px solid rgba(200, 169, 81, 0.3);
            position: absolute;
            animation: rotateSlow 30s infinite linear;
        }

        /* Círculos concéntricos */
        .circle-ring {
            position: absolute;
            border: 1px solid rgba(200, 169, 81, 0.15);
            border-radius: 50%;
            background: transparent;
            animation: pulseRing 6s infinite alternate;
        }

        /* Líneas de ley */
        .law-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(200, 169, 81, 0.4), transparent);
            width: 200%;
            transform: rotate(45deg);
            animation: slideLine 14s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            100% { transform: translateY(-40px) translateX(20px) rotate(5deg); }
        }

        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0.05; }
        }

        @keyframes slideLine {
            0% { transform: translateX(-50%) rotate(25deg); }
            100% { transform: translateX(50%) rotate(25deg); }
        }

        /* ==================== TARJETA DE LOGIN ==================== */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 2rem;
            animation: fadeSlideUp 0.8s ease-out;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(200, 169, 81, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(200, 169, 81, 0.1) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px black;
            border-color: rgba(200, 169, 81, 0.8);
        }

        /* Encabezado */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            background: linear-gradient(135deg, #E4C580, #A67C2E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .brand p {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .justice-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 6px gold);
        }

        /* Campos */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #C8A951;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a35;
            border-radius: 60px;
            color: #f0f0f0;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            font-family: monospace;
        }

        .input-field:focus {
            border-color: #C8A951;
            box-shadow: 0 0 12px rgba(200, 169, 81, 0.3);
            background: #0a0a10;
        }

        /* Botón */
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #C8A951, #9E7F34);
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #020202;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #dbb95c, #b38f3a);
            box-shadow: 0 0 18px rgba(200,169,81,0.6);
            color: #000;
        }

        /* Mensajes */
        .mensaje {
            margin-top: 1.5rem;
            padding: 0.8rem;
            border-radius: 60px;
            text-align: center;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
        }

        .mensaje.exito {
            background: rgba(46,125,50,0.2);
            border: 1px solid #2E7D32;
            color: #9eff9e;
        }

        .mensaje.error {
            background: rgba(198,40,40,0.2);
            border: 1px solid #C62828;
            color: #ffa098;
        }

        /* Footer */
        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.65rem;
            color: #777;
        }

        /* Animación de dominio */
        .dominio-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #000000dd, #000000);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .dominio-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .dominio-contenido {
            text-align: center;
            animation: expandir 2s ease-out;
        }

        @keyframes expandir {
            0% { transform: scale(0.2); opacity: 0; filter: blur(12px);}
            80% { transform: scale(1.1);}
            100% { transform: scale(1); opacity: 1;}
        }

        .dominio-texto {
            font-size: 2.8rem;
            font-weight: bold;
            color: #C8A951;
            text-shadow: 0 0 20px gold;
            font-family: 'Playfair Display', serif;
        }

        @media (max-width: 550px) {
            .login-wrapper { margin: 1rem; }
            .login-card { padding: 1.5rem; }
            .dominio-texto { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<!-- FONDO GEOMÉTRICO ÉPICO -->
<div class="geometric-bg">
    <div class="hexagon" style="top: 15%; left: -30px; width: 180px; height: 200px; animation-duration: 25s;"></div>
    <div class="hexagon" style="bottom: 5%; right: -20px; width: 240px; height: 270px; animation-duration: 35s; opacity: 0.6;"></div>
    <div class="circle-ring" style="top: 20%; right: 5%; width: 150px; height: 150px; animation-duration: 8s;"></div>
    <div class="circle-ring" style="bottom: 30%; left: -50px; width: 300px; height: 300px; animation-duration: 12s;"></div>
    <div class="law-line" style="top: 40%; left: -20%;"></div>
    <div class="law-line" style="bottom: 20%; right: -10%; transform: rotate(-35deg);"></div>
    <div class="geo-shape" style="width: 80px; height: 80px; top: 60%; left: 10%; border-radius: 20px; animation-duration: 18s;"></div>
    <div class="geo-shape" style="width: 40px; height: 40px; bottom: 15%; right: 15%; background: rgba(200,169,81,0.15); animation-duration: 12s; border-radius: 50%;"></div>
</div>

<!-- OVERLAY DE DOMINIO (para la animación especial) -->
<div class="dominio-overlay" id="dominioOverlay">
    <div class="dominio-contenido">
        <div class="dominio-texto">⚡ EXPANSIÓN DE DOMINIO ⚡</div>
        <div class="dominio-texto" style="font-size: 1.8rem;">〰️ IDLE DEATH GAMBLE 〰️</div>
    </div>
</div>

<!-- TARJETA DE LOGIN -->
<div class="login-wrapper">
    <div class="login-card">
        <div class="brand">
            <div class="justice-icon">⚖️</div>
            <h1>LEX PENAL</h1>
            <p>puertas de la justicia · acceso restringido</p>
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); iniciarSesion();">
            <div class="input-group">
                <label>📜 NÚMERO DE CÉDULA</label>
                <input type="text" id="cedula" class="input-field" placeholder="ej. 1018457093" required>
            </div>
            <div class="input-group">
                <label>🔒 CONTRASEÑA DE ACCESO</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">🎖️ INGRESAR AL SISTEMA 🎖️</button>
        </form>

        <div id="mensaje" class="mensaje"></div>
        <div class="footer-note">
            ⚖️ Administración de Justicia | Despacho Dr. Asmairo Conde
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/auth';
    const overlay = document.getElementById('dominioOverlay');
    const btn = document.getElementById('btnLogin');
    
    // Función para animación de expansión + sonido opcional
    function mostrarAnimacionDominio() {
        return new Promise((resolve) => {
            overlay.classList.add('active');
            // Intento de reproducir audio si existe (sin bloquear)
            try {
                let audio = new Audio('/assets/audio/dominio.mp3');
                audio.play().catch(e => console.log("Audio no disponible"));
            } catch(e) {}
            setTimeout(() => {
                overlay.classList.remove('active');
                resolve();
            }, 2200);
        });
    }

    async function iniciarSesion() {
        const cedula = document.getElementById('cedula').value.trim();
        const contrasena = document.getElementById('password').value.trim();
        const msgDiv = document.getElementById('mensaje');
        
        if (!cedula || !contrasena) {
            msgDiv.innerText = "❌ Complete todos los campos";
            msgDiv.className = "mensaje error";
            return;
        }

        // Bloquear botón mientras se procesa
        btn.disabled = true;
        btn.innerText = "⏳ VERIFICANDO CREDENCIALES...";
        msgDiv.innerText = "";
        
        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cedula, contrasena })
            });
            const data = await response.json();

            if (data.success) {
                // Guardar sesión
                localStorage.setItem('token', data.token);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('cedula', data.cedula);
                localStorage.setItem('rol', data.rol);
                
                // Animación especial para INGENIERO (hakari)
                if (data.rol === 'ingeniero') {
                    msgDiv.innerText = "🔧 ACCESO INGENIERO: DESBLOQUEANDO DOMINIO...";
                    msgDiv.className = "mensaje exito";
                    await mostrarAnimacionDominio();
                    // Redirigir a la máquina tragamonedas
                    window.location.replace('/jackpot-hakari.html');
                } 
                // Admin normal
                else if (data.rol === 'super_admin') {
                    msgDiv.innerText = "👑 BIENVENIDO ADMINISTRADOR";
                    msgDiv.className = "mensaje exito";
                    setTimeout(() => {
                        window.location.href = '/admin/index.html';
                    }, 1200);
                }
                // Usuario cliente
                else {
                    msgDiv.innerText = "✅ ACCESO CONCEDIDO, REDIRIGIENDO...";
                    msgDiv.className = "mensaje exito";
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                }
            } else {
                msgDiv.innerText = "❌ " + (data.error || "Credenciales inválidas");
                msgDiv.className = "mensaje error";
                btn.disabled = false;
                btn.innerText = "🎖️ INGRESAR AL SISTEMA 🎖️";
            }
        } catch (error) {
            console.error(error);
            msgDiv.innerText = "⚠️ ERROR DE CONEXIÓN CON EL SERVIDOR";
            msgDiv.className = "mensaje error";
            btn.disabled = false;
            btn.innerText = "🎖️ INGRESAR AL SISTEMA 🎖️";
        }
    }
</script>
</body>
</html>
