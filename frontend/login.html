<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexPenal - Acceso Administrador</title>
    <link rel="stylesheet" href="/css/estilo.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header" onclick="window.location.href='/'">
                <h2>⚖️ LexPenal</h2>
                <h3>Acceso Administrador</h3>
            </div>
            <form onsubmit="event.preventDefault(); iniciarSesion();">
                <div class="input-group">
                    <label>Cédula</label>
                    <input type="text" id="cedula" placeholder="1018457093" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login-submit">Ingresar al Panel</button>
            </form>
            <div id="mensaje" class="mensaje"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api/auth';

        async function iniciarSesion() {
            const cedula = document.getElementById('cedula').value;
            const contrasena = document.getElementById('password').value;
            const mensajeDiv = document.getElementById('mensaje');

            if (!cedula || !contrasena) {
                mostrarMensaje('Complete todos los campos', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cedula, contrasena })
                });

                const data = await response.json();

                if (data.success && data.isAdmin) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('nombre', data.nombre);
                    localStorage.setItem('cedula', data.cedula);
                    localStorage.setItem('isAdmin', true);
                    mostrarMensaje('¡Bienvenido Administrador!', 'exito');
                    setTimeout(() => {
                        window.location.href = '/admin/index.html';
                    }, 1000);
                } else {
                    mostrarMensaje('Credenciales incorrectas o no tienes permisos de administrador', 'error');
                }
            } catch (error) {
                mostrarMensaje('Error de conexión con el servidor', 'error');
            }
        }

        function mostrarMensaje(texto, tipo) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.textContent = texto;
            mensajeDiv.className = `mensaje ${tipo}`;
            setTimeout(() => {
                mensajeDiv.textContent = '';
                mensajeDiv.className = 'mensaje';
            }, 3000);
        }

        // Si ya hay sesión activa, redirigir
        const token = localStorage.getItem('token');
        const isAdmin = localStorage.getItem('isAdmin');
        if (token && isAdmin === 'true') {
            window.location.href = '/admin/index.html';
        }
    </script>
</body>
    </html>
