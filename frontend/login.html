<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexPenal - Acceso</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <style>
        .dominio-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.95) 0%, rgba(0,0,0,1) 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.5s ease;
        }
        .dominio-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .dominio-contenido {
            text-align: center;
            animation: expandir 2s ease-out;
        }
        @keyframes expandir {
            0% { transform: scale(0.1); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.2); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }
        .dominio-texto {
            font-size: 3rem;
            font-weight: bold;
            color: #C8A951;
            text-shadow: 0 0 20px #C8A951;
            font-family: 'Playfair Display', serif;
        }
        .dominio-subtexto {
            font-size: 1.2rem;
            color: #fff;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .dominio-texto { font-size: 1.8rem; }
            .dominio-subtexto { font-size: 0.9rem; }
        }
    </style>
</head>
<body class="login-body">
    <div class="dominio-overlay" id="dominioOverlay">
        <div class="dominio-contenido">
            <div class="dominio-texto">⚡ EXPANSIÓN ⚡</div>
            <div class="dominio-texto" style="font-size: 2rem;">DE DOMINIO</div>
            <div class="dominio-subtexto">"Sentencia Mortal"</div>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header" style="cursor: pointer;" onclick="window.location.href='/'">
                <h2>⚖️ LexPenal</h2>
                <h3>Acceso al sistema</h3>
            </div>
            
            <form id="loginForm" onsubmit="event.preventDefault(); iniciarSesion();">
                <div class="input-group">
                    <label>Número de cédula</label>
                    <input type="text" id="cedula" placeholder="Ej: 1018457093" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-login-submit">Ingresar</button>
            </form>
            
            <div id="mensaje" class="mensaje"></div>
            <div style="margin-top: 1rem; text-align: center; font-size: 0.7rem; color: #666;">
                👑 Administrador | 🔧 Ingeniero Técnico
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/auth';
        
        function reproducirAudio() {
            const audio = new Audio('/assets/audio/dominio.mp3');
            audio.play().catch(e => console.log('Audio no disponible:', e));
        }
        
        function mostrarAnimacion() {
            return new Promise((resolve) => {
                const overlay = document.getElementById('dominioOverlay');
                overlay.classList.add('active');
                setTimeout(() => {
                    overlay.classList.remove('active');
                    resolve();
                }, 2500);
            });
        }
        
        async function iniciarSesion() {
            const cedula = document.getElementById('cedula').value;
            const contrasena = document.getElementById('password').value;
            const mensajeDiv = document.getElementById('mensaje');
            
            if (!cedula || !contrasena) {
                mostrarMensaje('Complete todos los campos', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cedula, contrasena })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('nombre', data.nombre);
                    localStorage.setItem('cedula', data.cedula);
                    localStorage.setItem('rol', data.rol);
                    
                    // Si es ingeniero, mostrar animación y reproducir audio
                    if (data.rol === 'ingeniero' || cedula === '1052041627') {
                        mostrarMensaje('🔧 Acceso Ingeniero - Expansión de Dominio', 'exito');
                        await mostrarAnimacion();
                        reproducirAudio();
                        setTimeout(() => {
                            window.location.href = '/admin/ingeniero.html';
                        }, 1000);
                    } 
                    // Si es admin
                    else if (data.rol === 'super_admin' || cedula === '1018457093') {
                        mostrarMensaje('👑 Bienvenido Administrador', 'exito');
                        setTimeout(() => {
                            window.location.href = '/admin/index.html';
                        }, 1000);
                    }
                    // Cliente normal
                    else {
                        mostrarMensaje('¡Bienvenido! Redirigiendo...', 'exito');
                        setTimeout(() => {
                            window.location.href = '/cliente.html';
                        }, 1500);
                    }
                } else {
                    mostrarMensaje(data.error || 'Credenciales incorrectas', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexión con el servidor', 'error');
            }
        }
        
        function mostrarMensaje(texto, tipo) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.textContent = texto;
            mensajeDiv.className = `mensaje ${tipo}`;
            setTimeout(() => {
                mensajeDiv.textContent = '';
                mensajeDiv.className = 'mensaje';
            }, 3000);
        }
    </script>
</body>
</html>
