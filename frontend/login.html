<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexPenal | Acceso al Sistema</title>
    <style>
        /* === Mismo fondo geométrico y estilo de login === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Playfair Display', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .geometric-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .hexagon {
            width: 120px;
            height: 138px;
            background: rgba(200, 169, 81, 0.05);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 1px solid rgba(200, 169, 81, 0.3);
            position: absolute;
            animation: rotateSlow 30s infinite linear;
        }
        @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 2rem;
        }
        .login-card {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(200, 169, 81, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand h1 {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #E4C580, #A67C2E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .justice-icon { font-size: 3rem; filter: drop-shadow(0 0 6px gold); }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; color: #C8A951; font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a35;
            border-radius: 60px;
            color: #f0f0f0;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
        }
        .input-field:focus { border-color: #C8A951; box-shadow: 0 0 12px rgba(200, 169, 81, 0.3); }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #C8A951, #9E7F34);
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #020202;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login:hover { transform: scale(1.02); background: linear-gradient(95deg, #dbb95c, #b38f3a); }
        .mensaje { margin-top: 1rem; padding: 0.8rem; border-radius: 60px; text-align: center; font-size: 0.8rem; }
        .mensaje.exito { background: rgba(46,125,50,0.2); border: 1px solid #2E7D32; color: #9eff9e; }
        .mensaje.error { background: rgba(198,40,40,0.2); border: 1px solid #C62828; color: #ffa098; }
    </style>
</head>
<body>
<div class="geometric-bg">
    <div class="hexagon" style="top: 15%; left: -30px;"></div>
    <div class="hexagon" style="bottom: 5%; right: -20px;"></div>
</div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="brand"><div class="justice-icon">⚖️</div><h1>LEX PENAL</h1><p>puertas de la justicia</p></div>
        <div class="input-group"><label>📜 CÉDULA</label><input type="text" id="cedula" class="input-field" placeholder="1018457093"></div>
        <div class="input-group"><label>🔒 CONTRASEÑA</label><input type="password" id="password" class="input-field" placeholder="••••••"></div>
        <button class="btn-login" id="btnLogin">🎖️ INGRESAR</button>
        <div id="mensaje" class="mensaje"></div>
    </div>
</div>

<script>
    const API_URL = '/api/auth';
    async function iniciarSesion() {
        const cedula = document.getElementById('cedula').value.trim();
        const contrasena = document.getElementById('password').value.trim();
        const msgDiv = document.getElementById('mensaje');
        if (!cedula || !contrasena) {
            msgDiv.innerText = "❌ Complete todos los campos";
            msgDiv.className = "mensaje error";
            return;
        }
        const btn = document.getElementById('btnLogin');
        btn.disabled = true;
        btn.innerText = "⏳ VERIFICANDO...";
        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cedula, contrasena })
            });
            const data = await response.json();
            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('cedula', data.cedula);
                localStorage.setItem('rol', data.rol);
                if (data.rol === 'ingeniero') {
                    window.location.replace('/jackpot-hakari.html');
                } else if (data.rol === 'super_admin') {
                    msgDiv.innerText = "👑 BIENVENIDO ADMINISTRADOR";
                    msgDiv.className = "mensaje exito";
                    setTimeout(() => window.location.href = '/admin/index.html', 1000);
                } else {
                    msgDiv.innerText = "✅ ACCESO CONCEDIDO";
                    msgDiv.className = "mensaje exito";
                    setTimeout(() => window.location.href = '/', 800);
                }
            } else {
                msgDiv.innerText = "❌ " + (data.error || "Credenciales inválidas");
                msgDiv.className = "mensaje error";
                btn.disabled = false;
                btn.innerText = "🎖️ INGRESAR";
            }
        } catch (err) {
            console.error(err);
            msgDiv.innerText = "⚠️ ERROR DE CONEXIÓN";
            msgDiv.className = "mensaje error";
            btn.disabled = false;
            btn.innerText = "🎖️ INGRESAR";
        }
    }
    document.getElementById('btnLogin').addEventListener('click', iniciarSesion);
    document.getElementById('cedula').addEventListener('keypress', (e) => { if (e.key === 'Enter') iniciarSesion(); });
    document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') iniciarSesion(); });
</script>
</body>
</html>
