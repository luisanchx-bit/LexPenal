<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Idle Death Gamble | Slot Machine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
            overflow: hidden;
            position: relative;
        }

        /* Fondo de luz ambiental */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,215,0,0.02) 0px, rgba(255,215,0,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        /* Máquina principal */
        .slot-machine {
            background: #1e1b1a;
            border-radius: 80px;
            padding: 2rem 2.5rem;
            border: 12px solid #c9a03d;
            box-shadow: 0 25px 35px rgba(0,0,0,0.7), inset 0 1px 4px rgba(255,255,200,0.4);
            max-width: 780px;
            width: 90%;
            position: relative;
            transition: all 0.2s;
        }

        /* Panel decorativo */
        .top-led {
            text-align: center;
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: #ffd966;
            background: #000000aa;
            border-radius: 60px;
            width: 85%;
            margin: 0 auto 1.5rem;
            padding: 0.5rem 1rem;
            box-shadow: inset 0 0 6px gold, 0 2px 10px black;
            backdrop-filter: blur(2px);
        }

        /* Rodillos */
        .reels-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0 2rem;
            perspective: 800px;
        }

        .reel {
            background: #0c0a08;
            border-radius: 28px;
            padding: 1.5rem 1rem;
            width: 130px;
            text-align: center;
            border: 3px solid #e6b422;
            box-shadow: inset 0 0 20px #000000dd, 0 12px 25px black;
            transition: all 0.1s;
            position: relative;
        }

        /* Brillo interior del rodillo */
        .reel::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(255,215,0,0.15), transparent);
            border-radius: 28px;
            pointer-events: none;
        }

        .reel-symbol {
            font-size: 5rem;
            display: inline-block;
            filter: drop-shadow(0 0 4px #ffcc44);
            transition: 0.02s linear;
            line-height: 1;
        }

        /* Animación de giro suave */
        .spinning .reel-symbol {
            animation: smoothSpin 0.08s infinite linear;
        }

        @keyframes smoothSpin {
            0% { transform: translateY(0px) rotate(0deg); opacity: 1; text-shadow: 0 0 2px gold;}
            100% { transform: translateY(-20px) rotate(3deg); opacity: 0.85; text-shadow: 0 0 6px orange;}
        }

        /* Palanca */
        .lever-area {
            display: flex;
            justify-content: center;
            margin: 1.8rem 0;
        }

        .lever {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 35% 25%, #f3cd81, #b57c1c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 12px 0 #684e12, inset 0 1px 3px #ffeeaa;
            border: 1px solid #ffeaac;
            position: relative;
        }

        .lever:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #684e12;
        }

        /* Mensaje de premio */
        .jackpot-message {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd966, #ffaa22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 6px darkorange;
            letter-spacing: 6px;
            margin-top: 1.5rem;
            display: none;
            animation: pulseWin 0.4s infinite alternate;
        }

        @keyframes pulseWin {
            from { opacity: 0.8; text-shadow: 0 0 2px gold; }
            to { opacity: 1; text-shadow: 0 0 20px #ff6600; }
        }

        /* Efecto de luz estroboscópica (jackpot) */
        .winner-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ffd700, #ffaa33);
            pointer-events: none;
            z-index: 100;
            animation: flashWin 0.6s ease-out forwards;
        }

        @keyframes flashWin {
            0% { opacity: 0.9; background: radial-gradient(circle, #ffd700, #ffaa33);}
            100% { opacity: 0; background: transparent; }
        }

        /* Confeti dorado */
        .confetti {
            position: fixed;
            width: 10px;
            height: 20px;
            background: gold;
            top: -30px;
            animation: fall 2s linear forwards;
            z-index: 200;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(400deg); opacity: 0; }
        }

        /* Botón reset elegante */
        .reset-btn {
            background: #2a241f;
            border: 2px solid #c9a03d;
            color: #ffd966;
            border-radius: 40px;
            padding: 0.5rem 2rem;
            margin-top: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
            font-family: monospace;
        }

        .reset-btn:hover {
            background: #c9a03d;
            color: #1e1b1a;
            transform: scale(1.02);
            box-shadow: 0 0 12px gold;
        }

        /* Responsive */
        @media (max-width: 650px) {
            .slot-machine { padding: 1rem; border-width: 6px; }
            .reel { width: 85px; padding: 0.8rem; }
            .reel-symbol { font-size: 3rem; }
            .lever { width: 70px; height: 70px; font-size: 2.2rem; }
            .jackpot-message { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="slot-machine">
    <div class="top-led">⚡ IDLE DEATH GAMBLE ⚡</div>
    <div class="reels-container">
        <div class="reel" id="reel1"><div class="reel-symbol" id="symbol1">🎰</div></div>
        <div class="reel" id="reel2"><div class="reel-symbol" id="symbol2">🎰</div></div>
        <div class="reel" id="reel3"><div class="reel-symbol" id="symbol3">🎰</div></div>
    </div>
    <div class="lever-area">
        <div class="lever" id="leverBtn">🎰</div>
    </div>
    <div class="jackpot-message" id="jackpotMsg">✨ JACKPOT ✨</div>
    <div style="text-align: center;">
        <button class="reset-btn" id="resetBtn">🔄 GIRAR DE NUEVO</button>
    </div>
</div>

<script>
    const lever = document.getElementById('leverBtn');
    const reel1Sym = document.getElementById('symbol1');
    const reel2Sym = document.getElementById('symbol2');
    const reel3Sym = document.getElementById('symbol3');
    const reel1Div = document.getElementById('reel1');
    const reel2Div = document.getElementById('reel2');
    const reel3Div = document.getElementById('reel3');
    const jackpotDiv = document.getElementById('jackpotMsg');
    const resetBtn = document.getElementById('resetBtn');

    let spinning = false;
    let interval1, interval2, interval3;
    let stopTimeout1, stopTimeout2, stopTimeout3;

    // Símbolos de la máquina
    const symbols = ["💀", "🎰", "7️⃣", "⭐", "🔥", "💎", "🌀", "👑", "💰", "⚡"];

    function startSpin() {
        if (spinning) return;
        spinning = true;

        resetBtn.disabled = true;
        resetBtn.style.opacity = "0.5";

        jackpotDiv.style.display = "none";

        // Animación de la palanca
        lever.style.transform = "translateY(6px)";
        setTimeout(() => { lever.style.transform = ""; }, 130);

        // Iniciar giro visual
        reel1Div.classList.add('spinning');
        reel2Div.classList.add('spinning');
        reel3Div.classList.add('spinning');

        // Cambio de símbolos a alta velocidad
        interval1 = setInterval(() => {
            reel1Sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
        }, 55);
        interval2 = setInterval(() => {
            reel2Sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
        }, 55);
        interval3 = setInterval(() => {
            reel3Sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
        }, 55);

        // Parada progresiva de los rodillos (siempre terminan en 7️⃣)
        stopTimeout1 = setTimeout(() => {
            clearInterval(interval1);
            reel1Sym.innerText = "7️⃣";
            reel1Div.classList.remove('spinning');
        }, 850);

        stopTimeout2 = setTimeout(() => {
            clearInterval(interval2);
            reel2Sym.innerText = "7️⃣";
            reel2Div.classList.remove('spinning');
        }, 1050);

        stopTimeout3 = setTimeout(() => {
            clearInterval(interval3);
            reel3Sym.innerText = "7️⃣";
            reel3Div.classList.remove('spinning');
        }, 1250);

        // Evento final: Jackpot
        setTimeout(() => {
            spinning = false;
            resetBtn.disabled = false;
            resetBtn.style.opacity = "1";

            // Mostrar mensaje de premio
            jackpotDiv.style.display = "block";

            // Flash de luz intenso
            const flash = document.createElement('div');
            flash.classList.add('winner-flash');
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 700);

            // Confeti dorado
            for (let i = 0; i < 180; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + "%";
                conf.style.width = Math.random() * 10 + 5 + "px";
                conf.style.height = Math.random() * 18 + 8 + "px";
                conf.style.background = `hsl(${Math.random() * 60 + 40}, 100%, 60%)`;
                conf.style.animationDuration = Math.random() * 1.8 + 1 + "s";
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 2500);
            }

            // Pequeña vibración de la máquina (efecto de impacto)
            const machine = document.querySelector('.slot-machine');
            machine.style.transform = "scale(1.01)";
            setTimeout(() => machine.style.transform = "", 200);

        }, 1350);
    }

    // Reset manual: limpia y vuelve a girar
    resetBtn.addEventListener('click', () => {
        if (spinning) return;
        // Limpiar cualquier intervalo pendiente
        clearTimeout(stopTimeout1);
        clearTimeout(stopTimeout2);
        clearTimeout(stopTimeout3);
        clearInterval(interval1);
        clearInterval(interval2);
        clearInterval(interval3);
        reel1Div.classList.remove('spinning');
        reel2Div.classList.remove('spinning');
        reel3Div.classList.remove('spinning');
        reel1Sym.innerText = "🎰";
        reel2Sym.innerText = "🎰";
        reel3Sym.innerText = "🎰";
        jackpotDiv.style.display = "none";
        startSpin();
    });

    // Acción de la palanca
    lever.addEventListener('click', startSpin);

    // Girar automáticamente al cargar la página para mostrar el esplendor
    window.addEventListener('load', () => {
        setTimeout(() => {
            startSpin();
        }, 400);
    });
</script>
</body>
</html>
