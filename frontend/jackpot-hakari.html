<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evangelion - Domain Expansion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #ff0000, #3a0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        .blood-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 0, 0, 0.3) 0px,
                rgba(255, 0, 0, 0.3) 2px,
                transparent 2px,
                transparent 8px
            );
            pointer-events: none;
            z-index: 0;
        }

        .domain-container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .ege-title {
            font-size: 3rem;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 0 0 20px red, 0 0 40px darkred;
            letter-spacing: 8px;
            font-family: 'Impact', 'Courier New', monospace;
            margin-bottom: 1rem;
            animation: pulseRed 1.5s infinite alternate;
        }

        @keyframes pulseRed {
            from { text-shadow: 0 0 10px red; }
            to { text-shadow: 0 0 30px #ff6666; }
        }

        .ege-sub {
            font-size: 1.5rem;
            color: #ff8888;
            font-family: monospace;
            letter-spacing: 4px;
            margin-top: 1rem;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .question {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.7);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 10px;
            margin-top: 2rem;
            font-family: 'Georgia', serif;
        }

        .loading-bar {
            width: 300px;
            height: 4px;
            background: #330000;
            margin: 2rem auto 0;
            position: relative;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: #ff3333;
            animation: loadProgress 2.5s linear forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .static-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                #fff 0px,
                #fff 2px,
                #000 2px,
                #000 4px
            );
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            animation: staticFlicker 0.5s forwards;
            animation-delay: 2.3s;
        }

        @keyframes staticFlicker {
            0% { opacity: 0; }
            10% { opacity: 0.8; }
            20% { opacity: 0; }
            30% { opacity: 0.9; }
            40% { opacity: 0; }
            50% { opacity: 0.7; }
            100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .ege-title { font-size: 1.8rem; }
            .question { font-size: 1.2rem; }
            .ege-sub { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="blood-lines"></div>
    <div class="domain-container">
        <div class="ege-title">EVANGELION</div>
        <div class="ege-sub">CAP.25</div>
        <div class="question">"Do You Love Me?"</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>
    <div class="static-overlay"></div>

    <script>
        setTimeout(() => {
            window.location.href = "/admin/ingeniero.html";
        }, 3000);
    </script>
</body>
</html>
