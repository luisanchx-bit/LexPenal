<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Penas - LexPenal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilo.css">
    <style>
        .calculadora-container {
            max-width: 800px;
            margin: 100px auto 4rem;
            padding: 2rem;
            background: #0a0a0a;
            border-radius: 20px;
            border: 1px solid rgba(200, 169, 81, 0.3);
        }
        .calculadora-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .calculadora-title h1 {
            color: #C8A951;
            font-size: 2rem;
        }
        .calculadora-title p {
            color: #888;
            margin-top: 0.5rem;
        }
        .paso-indicador {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }
        .paso {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-weight: bold;
        }
        .paso.activo {
            border-color: #C8A951;
            color: #C8A951;
            background: rgba(200, 169, 81, 0.1);
        }
        .paso.completado {
            background: #C8A951;
            border-color: #C8A951;
            color: #000;
        }
        .pregunta-card {
            background: #050505;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
        }
        .pregunta-titulo {
            color: #C8A951;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            border-left: 3px solid #C8A951;
            padding-left: 1rem;
        }
        .opciones {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .opcion {
            background: #111;
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #222;
        }
        .opcion:hover {
            border-color: #C8A951;
            background: rgba(200, 169, 81, 0.1);
        }
        .opcion.seleccionada {
            border-color: #C8A951;
            background: rgba(200, 169, 81, 0.2);
        }
        .botones-navegacion {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }
        .btn-nav {
            background: transparent;
            border: 1px solid #C8A951;
            color: #C8A951;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-nav:hover {
            background: #C8A951;
            color: #000;
        }
        .resultado-card {
            background: linear-gradient(135deg, #0a1628, #050505);
            padding: 2rem;
            border-radius: 15px;
            border-left: 4px solid #C8A951;
        }
        .resultado-pena {
            font-size: 2.5rem;
            color: #C8A951;
            text-align: center;
            margin: 1rem 0;
        }
        .resultado-articulo {
            background: #0a0a0a;
            padding: 1rem;
            border-radius: 10px;
            font-family: monospace;
            margin: 1rem 0;
        }
        .sentencia-texto {
            background: #0a0a0a;
            padding: 1.5rem;
            border-radius: 10px;
            font-style: italic;
            line-height: 1.8;
            margin: 1rem 0;
            border-left: 3px solid #C8A951;
        }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 1rem;
        }
        .btn-reiniciar {
            background: transparent;
            border: 1px solid #C8A951;
            color: #C8A951;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        .delito-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .delito-card {
            background: #111;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #222;
        }
        .delito-card:hover {
            border-color: #C8A951;
            transform: translateY(-3px);
        }
        .delito-card.seleccionado {
            border-color: #C8A951;
            background: rgba(200, 169, 81, 0.1);
        }
        .delito-icono {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" style="cursor:pointer" onclick="window.location.href='/'">
                <h2>⚖️ LexPenal</h2>
            </div>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/">Inicio</a></li>
                <li><a href="/login.html">Acceder</a></li>
            </ul>
        </div>
    </nav>

    <div class="calculadora-container" id="calculadoraApp">
        <!-- Pantalla 1: Selección de delito -->
        <div id="pantallaDelitos">
            <div class="calculadora-title">
                <h1>⚖️ Calculadora de Penas</h1>
                <p>Código Penal Colombiano - Ley 599 de 2000</p>
            </div>
            <div class="delito-grid" id="delitosGrid"></div>
        </div>

        <!-- Pantalla 2: Preguntas -->
        <div id="pantallaPreguntas" class="hidden">
            <div class="paso-indicador" id="pasosIndicador"></div>
            <div class="pregunta-card" id="preguntaCard"></div>
            <div class="botones-navegacion">
                <button class="btn-nav" id="btnAnterior">◀ Anterior</button>
                <button class="btn-nav" id="btnSiguiente">Siguiente ▶</button>
            </div>
        </div>

        <!-- Pantalla 3: Resultado -->
        <div id="pantallaResultado" class="hidden">
            <div class="calculadora-title">
                <h1>⚖️ Resultado del Cálculo</h1>
                <p>Análisis según el Código Penal Colombiano</p>
            </div>
            <div class="resultado-card" id="resultadoCard"></div>
            <button class="btn-whatsapp" id="btnWhatsApp">📱 Enviar al Abogado por WhatsApp</button>
            <button class="btn-reiniciar" id="btnReiniciar">🔄 Calcular otro delito</button>
        </div>
    </div>

    <footer style="margin-top: 2rem;">
        <div class="container">
            <p>© 2026 LexPenal - Asesoría Legal Profesional</p>
            <p>⚖️ Código Penal Colombiano - Ley 599 de 2000</p>
        </div>
    </footer>

    <script>
        // ============ BASE DE DATOS DE DELITOS ============
        const delitos = {
            homicidio: {
                nombre: "Homicidio",
                icono: "🔪",
                articulo: "103",
                texto_articulo: "Artículo 103. Homicidio. El que matare a otro, incurrirá en prisión de trece (13) a veinticinco (25) años.",
                pena_min_base: 13,
                pena_max_base: 25,
                preguntas: [
                    {
                        id: "modalidad",
                        texto: "¿Cómo ocurrió el homicidio?",
                        opciones: [
                            { valor: "doloso", texto: "Doloso (con intención de matar)", articulo: "103", pena_min: 13, pena_max: 25 },
                            { valor: "culposo", texto: "Culposo (accidental, sin intención)", articulo: "106", pena_min: 2, pena_max: 6 }
                        ]
                    },
                    {
                        id: "consumacion",
                        texto: "¿El hecho fue consumado o tentativa?",
                        opciones: [
                            { valor: "consumado", texto: "Consumado (se completó el acto)", factor: 1 },
                            { valor: "tentativa", texto: "Tentativa (no se completó)", factor: 0.5 }
                        ]
                    },
                    {
                        id: "agravantes",
                        texto: "¿Concurren circunstancias de agravación?",
                        opciones: [
                            { valor: "si", texto: "Sí (parentesco, precio, etc.)", aumento: 10 },
                            { valor: "no", texto: "No", aumento: 0 }
                        ]
                    },
                    {
                        id: "atenuantes",
                        texto: "¿Concurren circunstancias de atenuación?",
                        opciones: [
                            { valor: "si", texto: "Sí (arrojo, estado de ira, confesión)", reduccion: 5 },
                            { valor: "no", texto: "No", reduccion: 0 }
                        ]
                    }
                ]
            },
            violacion: {
                nombre: "Violación",
                icono: "🛡️",
                articulo: "205",
                texto_articulo: "Artículo 205. Acceso carnal violento. El que realice acceso carnal mediante violencia, incurrirá en prisión de doce (12) a veinte (20) años.",
                pena_min_base: 12,
                pena_max_base: 20,
                preguntas: [
                    {
                        id: "menor",
                        texto: "¿La víctima es menor de edad?",
                        opciones: [
                            { valor: "si", texto: "Sí", aumento: 8 },
                            { valor: "no", texto: "No", aumento: 0 }
                        ]
                    },
                    {
                        id: "parentesco",
                        texto: "¿Existe parentesco con la víctima?",
                        opciones: [
                            { valor: "si", texto: "Sí", aumento: 5 },
                            { valor: "no", texto: "No", aumento: 0 }
                        ]
                    }
                ]
            },
            robo: {
                nombre: "Robo",
                icono: "🔫",
                articulo: "239",
                texto_articulo: "Artículo 239. Robo. El que se apodere de una cosa mueble ajena mediante violencia, incurrirá en prisión de seis (6) a doce (12) años.",
                pena_min_base: 6,
                pena_max_base: 12,
                preguntas: [
                    {
                        id: "arma",
                        texto: "¿Se utilizó arma?",
                        opciones: [
                            { valor: "fuego", texto: "Arma de fuego", aumento: 6 },
                            { valor: "blanca", texto: "Arma blanca", aumento: 4 },
                            { valor: "ninguna", texto: "Sin arma", aumento: 0 }
                        ]
                    },
                    {
                        id: "violencia",
                        texto: "¿Hubo violencia contra la víctima?",
                        opciones: [
                            { valor: "si", texto: "Sí", aumento: 3 },
                            { valor: "no", texto: "No", aumento: 0 }
                        ]
                    }
                ]
            }
        };

        let delitoSeleccionado = null;
        let respuestas = {};
        let pasoActual = 0;

        function cargarDelitos() {
            const grid = document.getElementById('delitosGrid');
            grid.innerHTML = '';
            for (const [key, delito] of Object.entries(delitos)) {
                grid.innerHTML += `
                    <div class="delito-card" onclick="seleccionarDelito('${key}')">
                        <div class="delito-icono">${delito.icono}</div>
                        <h3>${delito.nombre}</h3>
                        <p style="font-size:0.8rem; color:#888;">Art. ${delito.articulo}</p>
                    </div>
                `;
            }
        }

        function seleccionarDelito(key) {
            delitoSeleccionado = key;
            respuestas = {};
            pasoActual = 0;
            iniciarPreguntas();
        }

        function iniciarPreguntas() {
            document.getElementById('pantallaDelitos').classList.add('hidden');
            document.getElementById('pantallaPreguntas').classList.remove('hidden');
            document.getElementById('pantallaResultado').classList.add('hidden');
            actualizarPregunta();
        }

        function actualizarPregunta() {
            const delito = delitos[delitoSeleccionado];
            const preguntas = delito.preguntas;
            const pregunta = preguntas[pasoActual];
            
            // Actualizar pasos
            const pasosIndicador = document.getElementById('pasosIndicador');
            pasosIndicador.innerHTML = '';
            for (let i = 0; i < preguntas.length; i++) {
                let clase = 'paso';
                if (i === pasoActual) clase += ' activo';
                else if (respuestas[preguntas[i].id]) clase += ' completado';
                pasosIndicador.innerHTML += `<div class="${clase}">${i + 1}</div>`;
            }
            
            // Mostrar pregunta
            const preguntaCard = document.getElementById('preguntaCard');
            let opcionesHtml = '';
            pregunta.opciones.forEach(op => {
                const isSelected = respuestas[pregunta.id] === op.valor;
                opcionesHtml += `
                    <div class="opcion ${isSelected ? 'seleccionada' : ''}" onclick="seleccionarOpcion('${pregunta.id}', '${op.valor}')">
                        ${op.texto}
                    </div>
                `;
            });
            
            preguntaCard.innerHTML = `
                <div class="pregunta-titulo">${pregunta.texto}</div>
                <div class="opciones">${opcionesHtml}</div>
            `;
        }

        function seleccionarOpcion(preguntaId, valor) {
            respuestas[preguntaId] = valor;
            actualizarPregunta();
        }

        document.getElementById('btnSiguiente').addEventListener('click', () => {
            const delito = delitos[delitoSeleccionado];
            const pregunta = delito.preguntas[pasoActual];
            if (!respuestas[pregunta.id]) {
                alert('Por favor selecciona una opción antes de continuar');
                return;
            }
            
            if (pasoActual < delito.preguntas.length - 1) {
                pasoActual++;
                actualizarPregunta();
            } else {
                calcularResultado();
            }
        });

        document.getElementById('btnAnterior').addEventListener('click', () => {
            if (pasoActual > 0) {
                pasoActual--;
                actualizarPregunta();
            }
        });

        function calcularResultado() {
            const delito = delitos[delitoSeleccionado];
            let penaMin = delito.pena_min_base;
            let penaMax = delito.pena_max_base;
            let articuloAplicado = delito.articulo;
            let factores = [];
            
            // Procesar respuestas
            for (const pregunta of delito.preguntas) {
                const respuesta = respuestas[pregunta.id];
                const opcion = pregunta.opciones.find(o => o.valor === respuesta);
                
                if (opcion) {
                    if (opcion.articulo) articuloAplicado = opcion.articulo;
                    if (opcion.pena_min) penaMin = opcion.pena_min;
                    if (opcion.pena_max) penaMax = opcion.pena_max;
                    if (opcion.factor) {
                        penaMin = Math.floor(penaMin * opcion.factor);
                        penaMax = Math.floor(penaMax * opcion.factor);
                        factores.push(`Tentativa: reducción del 50%`);
                    }
                    if (opcion.aumento) {
                        penaMin += opcion.aumento;
                        penaMax += opcion.aumento;
                        factores.push(`Circunstancia agravante: +${opcion.aumento} años`);
                    }
                    if (opcion.reduccion) {
                        penaMin -= opcion.reduccion;
                        penaMax -= opcion.reduccion;
                        factores.push(`Circunstancia atenuante: -${opcion.reduccion} años`);
                    }
                }
            }
            
            // Asegurar penas no negativas
            penaMin = Math.max(0, penaMin);
            penaMax = Math.max(0, penaMax);
            
            const penaMedia = Math.floor((penaMin + penaMax) / 2);
            
            // Construir sentencia
            const sentencia = `
                <div class="resultado-pena">⚖️ ${penaMin} a ${penaMax} AÑOS de prisión</div>
                <div class="resultado-articulo">
                    <strong>📜 Fundamento Legal:</strong><br>
                    Artículo ${articuloAplicado} de la Ley 599 de 2000 (Código Penal Colombiano)
                </div>
                <div class="sentencia-texto">
                    <strong>⚖️ SENTENCIA ESTIMADA:</strong><br><br>
                    "De conformidad con el artículo ${articuloAplicado} de la Ley 599 de 2000, el delito de ${delito.nombre} tiene una pena prevista de ${penaMin} a ${penaMax} años de prisión.
                    ${factores.length > 0 ? ` Se valoraron las siguientes circunstancias: ${factores.join(', ')}.` : ''}
                    En este caso, se impone una pena de ${penaMedia} años de prisión, al no existir circunstancias que modifiquen la punibilidad dentro del rango establecido por el legislador."
                </div>
                <div class="resultado-articulo">
                    <strong>📋 Nota:</strong> Este cálculo es una estimación basada en la información proporcionada. La pena definitiva será determinada por un juez de la República.
                </div>
            `;
            
            document.getElementById('resultadoCard').innerHTML = sentencia;
            window.resultadoSentencia = sentencia;
            
            document.getElementById('pantallaPreguntas').classList.add('hidden');
            document.getElementById('pantallaResultado').classList.remove('hidden');
        }

        document.getElementById('btnWhatsApp').addEventListener('click', () => {
            const mensaje = encodeURIComponent(`📋 *CALCULADORA DE PENAS - LEXPENAL* 📋\n\n${window.resultadoSentencia.replace(/<[^>]*>/g, '')}\n\nConsulta realizada a través de LexPenal.`);
            window.open(`https://wa.me/573145879875?text=${mensaje}`, '_blank');
        });

        document.getElementById('btnReiniciar').addEventListener('click', () => {
            delitoSeleccionado = null;
            respuestas = {};
            pasoActual = 0;
            document.getElementById('pantallaResultado').classList.add('hidden');
            document.getElementById('pantallaDelitos').classList.remove('hidden');
        });

        // Menú responsive
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        }

        cargarDelitos();
    </script>
</body>
    </html>
